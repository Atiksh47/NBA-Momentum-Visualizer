<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Momentum Visualizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #060606;
  color: #fff;
  font-family: 'Georgia', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
}

header {
  text-align: center;
  margin-bottom: 64px;
}
header h1 {
  font-size: clamp(20px, 4vw, 40px);
  font-weight: 300;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
}
header p {
  font-size: clamp(11px, 1.6vw, 14px);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
}

.games {
  display: flex;
  flex-direction: column;
  gap: 2px;
  width: 100%;
  max-width: 680px;
}

.game-card {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 22px 24px;
  text-decoration: none;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 4px;
  background: rgba(255,255,255,0.02);
  transition: background 0.2s ease, border-color 0.2s ease;
  cursor: pointer;
}
.game-card:hover {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.18);
}

.team-colors {
  display: flex;
  gap: 3px;
  flex-shrink: 0;
}
.swatch {
  width: 10px;
  height: 36px;
  border-radius: 2px;
}

.game-info { flex: 1; min-width: 0; }
.game-title {
  font-size: clamp(15px, 2.2vw, 19px);
  font-weight: 300;
  letter-spacing: -0.01em;
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.game-subtitle {
  font-size: clamp(11px, 1.5vw, 13px);
  color: rgba(255,255,255,0.38);
  letter-spacing: 0.02em;
}

.game-date {
  font-size: 11px;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
  flex-shrink: 0;
  text-align: right;
}

.arrow {
  color: rgba(255,255,255,0.2);
  font-size: 14px;
  flex-shrink: 0;
  transition: color 0.2s, transform 0.2s;
}
.game-card:hover .arrow { color: rgba(255,255,255,0.6); transform: translateX(3px); }

footer {
  margin-top: 56px;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.12);
  text-align: center;
}
</style>
</head>
<body>

<header>
  <h1>NBA Momentum Visualizer</h1>
  <p>What did the game feel like?</p>
</header>

<div class="games" id="games"></div>

<footer>Data from NBA Stats API &nbsp;·&nbsp; Minimalist Mode</footer>

<script>
const GAMES = [
  {
    id:       '0041500407',
    title:    '2016 Finals Game 7',
    subtitle: 'The Comeback. The Block. The Shot.',
    date:     'Jun 19, 2016',
    home:     { team: 'GSW', color: '#1D428A', color2: '#FFC72C' },
    away:     { team: 'CLE', color: '#860038', color2: '#FDBB30' },
  },
  {
    id:       '0021501228',
    title:    "Kobe's Last Game",
    subtitle: '60 points. Curtain call.',
    date:     'Apr 13, 2016',
    home:     { team: 'LAL', color: '#552583', color2: '#FDB927' },
    away:     { team: 'UTA', color: '#00471B', color2: '#F9A01B' },
  },
  {
    id:       '0021501226',
    title:    'Warriors Win 73',
    subtitle: 'The regular season record that defined an era.',
    date:     'Apr 13, 2016',
    home:     { team: 'GSW', color: '#1D428A', color2: '#FFC72C' },
    away:     { team: 'MEM', color: '#5D76A9', color2: '#12173F' },
  },
  {
    id:       '0021500568',
    title:    'Christmas 2015 — Warriors vs Cavs',
    subtitle: 'The rematch. Curry vs LeBron.',
    date:     'Dec 25, 2015',
    home:     { team: 'GSW', color: '#1D428A', color2: '#FFC72C' },
    away:     { team: 'CLE', color: '#860038', color2: '#FDBB30' },
  },
  {
    id:       '0042100306',
    title:    '2022 Finals Game 6 — Curry 43',
    subtitle: 'Curry claims his Finals MVP.',
    date:     'Jun 16, 2022',
    home:     { team: 'BOS', color: '#007A33', color2: '#BA9653' },
    away:     { team: 'GSW', color: '#1D428A', color2: '#FFC72C' },
  },
];

const container = document.getElementById('games');

GAMES.forEach(g => {
  const card = document.createElement('a');
  card.className = 'game-card';
  card.href      = `visualizer.html?game=${g.id}`;

  card.innerHTML = `
    <div class="team-colors">
      <div class="swatch" style="background:${g.home.color}"></div>
      <div class="swatch" style="background:${g.home.color2}"></div>
      <div class="swatch" style="background:${g.away.color2}"></div>
      <div class="swatch" style="background:${g.away.color}"></div>
    </div>
    <div class="game-info">
      <div class="game-title">${g.title}</div>
      <div class="game-subtitle">${g.subtitle}</div>
    </div>
    <div class="game-date">${g.date}</div>
    <div class="arrow">→</div>
  `;

  container.appendChild(card);
});
</script>
</body>
</html>
