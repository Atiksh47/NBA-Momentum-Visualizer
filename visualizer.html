<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Momentum Visualizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Georgia', serif; color: #fff; }
canvas { display: block; }

#moment-overlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: 20;
}
#moment-overlay.fade-out {
  transition: opacity 1.2s ease;
}
#moment-label { font-size: clamp(11px, 1.8vw, 14px); letter-spacing: 0.35em; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 10px; }
#moment-text  { font-size: clamp(24px, 5vw, 56px); font-weight: 300; letter-spacing: -0.02em; line-height: 1.1; }

#score-display {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
  z-index: 20;
  opacity: 0;
  transition: opacity 1s ease;
}
#score-line { font-size: clamp(18px, 3vw, 28px); font-weight: 300; letter-spacing: 0.05em; }
#clock-line { font-size: clamp(10px, 1.5vw, 13px); letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 4px; }

#back-btn {
  position: fixed;
  top: 24px;
  left: 24px;
  z-index: 30;
  opacity: 0;
  transition: opacity 1s ease;
  background: none;
  border: none;
  color: rgba(255,255,255,0.25);
  font-size: 12px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  text-decoration: none;
  font-family: 'Georgia', serif;
}
#back-btn:hover { color: rgba(255,255,255,0.7); }

#controls {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%;
  padding: 40px 24px 20px;
  z-index: 30;
  opacity: 0;
  transition: opacity 1s ease;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
}
#timeline {
  position: relative;
  width: 100%;
  height: 28px;
  cursor: pointer;
  margin-bottom: 12px;
}
#timeline-track {
  position: absolute;
  top: 50%; left: 0;
  width: 100%; height: 2px;
  background: rgba(255,255,255,0.15);
  transform: translateY(-50%);
  border-radius: 1px;
}
#timeline-fill { height: 100%; width: 0%; background: rgba(255,255,255,0.5); border-radius: 1px; }
#timeline-thumb {
  position: absolute;
  top: 50%; left: 0%;
  width: 10px; height: 10px;
  background: #fff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: transform 0.1s ease;
}
#timeline:hover #timeline-thumb { transform: translate(-50%, -50%) scale(1.4); }

.moment-tick {
  position: absolute;
  top: 50%;
  width: 2px; height: 8px;
  transform: translate(-50%, -50%);
  border-radius: 1px;
  opacity: 0.6;
  cursor: pointer;
}
.moment-tick:hover::after {
  content: attr(data-label);
  position: absolute;
  bottom: 14px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  white-space: nowrap;
  background: rgba(0,0,0,0.85);
  padding: 2px 6px;
  border-radius: 3px;
  color: #fff;
  font-family: 'Georgia', serif;
  letter-spacing: 0.05em;
}

#control-row { display: flex; align-items: center; gap: 16px; }
#play-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  width: 32px; height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: border-color 0.2s;
}
#play-btn:hover { border-color: rgba(255,255,255,0.7); }
#time-readout { font-size: 12px; letter-spacing: 0.1em; color: rgba(255,255,255,0.4); min-width: 90px; font-family: monospace; }
#speed-btns { display: flex; gap: 6px; margin-left: auto; }
.speed-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.4);
  font-size: 11px; padding: 3px 8px;
  border-radius: 3px; cursor: pointer;
  letter-spacing: 0.05em;
  transition: color 0.2s, border-color 0.2s;
  font-family: 'Georgia', serif;
}
.speed-btn:hover, .speed-btn.active { color: #fff; border-color: rgba(255,255,255,0.5); }

/* ── Mode toggle ── */
#mode-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.4);
  font-size: 11px; padding: 3px 10px;
  border-radius: 3px; cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: color 0.2s, border-color 0.2s;
  font-family: 'Georgia', serif;
  flex-shrink: 0;
}
#mode-btn:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
#mode-btn.anime      { color: #ff4466; border-color: rgba(255,68,102,0.5); }
#mode-btn.cosmic     { color: #88aaff; border-color: rgba(136,170,255,0.5); }
#mode-btn.broadcast  { color: #ffcc44; border-color: rgba(255,204,68,0.5); }

#cosmic-c {
  display: none;
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 1;
}

/* ── Anime chyron overlay ── */
#chyron {
  position: fixed;
  bottom: 110px;
  left: 0;
  pointer-events: none;
  z-index: 20;
  overflow: hidden;
  height: 48px;
  display: flex;
  align-items: center;
}
#chyron-inner {
  padding: 0 20px 0 0;
  font-family: 'Arial Black', 'Arial', sans-serif;
  font-weight: 900;
  font-size: clamp(18px, 3.5vw, 32px);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: #fff;
  white-space: nowrap;
  transform: translateX(-110%);
  transition: transform 0s;
  background: #ff4466;
  padding: 6px 20px 6px 24px;
  clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 0 100%);
}
#chyron-inner.wipe-in  { transform: translateX(0);    transition: transform 0.18s cubic-bezier(0.2,0,0,1); }
#chyron-inner.wipe-out { transform: translateX(-110%); transition: transform 0.22s cubic-bezier(0.4,0,1,1); }

/* ── Broadcast HUD ── */
#broadcast-hud {
  display: none;
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 20;
  font-family: 'Arial', sans-serif;
}

/* Score bug */
#bc-score-bug {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: stretch;
  height: 52px;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,0.7);
}
.bc-team-block {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  min-width: 110px;
}
.bc-team-block.home { flex-direction: row; }
.bc-team-block.away { flex-direction: row-reverse; }
.bc-tricode {
  font-size: 15px;
  font-weight: 900;
  letter-spacing: 0.08em;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.bc-score {
  font-size: 22px;
  font-weight: 900;
  color: #fff;
  min-width: 28px;
  text-align: center;
}
.bc-foul-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: #ff4444;
  background: rgba(255,68,68,0.18);
  border: 1px solid rgba(255,68,68,0.5);
  border-radius: 2px;
  padding: 1px 4px;
  align-self: center;
  opacity: 0;
  transition: opacity 0.4s;
}
.bc-foul-badge.visible { opacity: 1; }
#bc-clock-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 14px;
  background: rgba(10,10,20,0.92);
  min-width: 72px;
  border-left: 1px solid rgba(255,255,255,0.08);
  border-right: 1px solid rgba(255,255,255,0.08);
}
#bc-clock { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: 0.05em; }
#bc-period { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 2px; }

/* Momentum bar */
#bc-momentum-bar {
  position: absolute;
  top: 78px;
  left: 50%;
  transform: translateX(-50%);
  width: 340px;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}
#bc-momentum-fill {
  position: absolute;
  top: 0; bottom: 0;
  transition: left 0.4s ease, right 0.4s ease, background 0.4s ease;
}

/* Shooting streak tag */
#bc-streak {
  position: absolute;
  top: 96px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 3px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s;
}
#bc-streak.visible { opacity: 1; }

/* Live run banner */
#bc-run-banner {
  position: absolute;
  bottom: 120px;
  left: 0;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #fff;
  background: rgba(10,10,20,0.88);
  border-left: 4px solid #fff;
  padding: 8px 18px;
  opacity: 0;
  transform: translateX(-8px);
  transition: opacity 0.3s, transform 0.3s;
}
#bc-run-banner.visible { opacity: 1; transform: translateX(0); }

/* Quarter recap */
#bc-recap {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}
#bc-recap.visible { opacity: 1; }
#bc-recap-label { font-size: 11px; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
#bc-recap-score { font-size: 48px; font-weight: 900; color: #fff; letter-spacing: -0.02em; }

/* ── Start screen ── */
#start-screen {
  position: fixed; inset: 0;
  background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100; cursor: pointer;
  transition: opacity 1.2s ease;
}
#start-screen h1 { font-size: clamp(28px, 5vw, 64px); font-weight: 300; letter-spacing: -0.02em; }
#start-screen .meta { font-size: clamp(11px, 1.6vw, 14px); letter-spacing: 0.35em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-top: 10px; }
#start-screen .prompt { font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.2); margin-top: 48px; animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

/* ── End card ── */
#end-card {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 2s ease;
}
#end-card.visible { opacity: 1; pointer-events: auto; }
#end-winner { font-size: clamp(11px, 1.8vw, 14px); letter-spacing: 0.4em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 16px; }
#end-score  { font-size: clamp(36px, 7vw, 88px); font-weight: 300; letter-spacing: -0.02em; margin-bottom: 20px; }
#end-sentence { font-size: clamp(13px, 2vw, 18px); font-weight: 300; color: rgba(255,255,255,0.5); max-width: 560px; line-height: 1.6; margin-bottom: 48px; }
#end-back {
  font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(255,255,255,0.25); text-decoration: none;
  border: 1px solid rgba(255,255,255,0.15); padding: 10px 24px; border-radius: 3px;
  transition: color 0.2s, border-color 0.2s;
  font-family: 'Georgia', serif;
}
#end-back:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
</style>
</head>
<body>

<div id="start-screen">
  <h1 id="start-title">Loading…</h1>
  <div class="meta" id="start-meta"></div>
  <div class="prompt">click to begin</div>
</div>

<canvas id="c"></canvas>
<canvas id="cosmic-c"></canvas>

<a id="back-btn" href="index.html">← All Games</a>

<div id="score-display">
  <div id="score-line"></div>
  <div id="clock-line"></div>
</div>

<div id="moment-overlay">
  <div id="moment-label"></div>
  <div id="moment-text"></div>
</div>

<div id="controls">
  <div id="timeline">
    <div id="timeline-track"><div id="timeline-fill"></div></div>
    <div id="timeline-thumb"></div>
  </div>
  <div id="control-row">
    <button id="play-btn">▶</button>
    <span id="time-readout">Q1 0:00</span>
    <div id="speed-btns">
      <button class="speed-btn" data-speed="0.5">½×</button>
      <button class="speed-btn active" data-speed="1">1×</button>
      <button class="speed-btn" data-speed="2">2×</button>
      <button class="speed-btn" data-speed="4">4×</button>
    </div>
    <button id="mode-btn">Minimal</button>
  </div>
</div>

<div id="chyron"><div id="chyron-inner"></div></div>

<div id="broadcast-hud">
  <div id="bc-score-bug">
    <div class="bc-team-block home" id="bc-home-block">
      <div class="bc-tricode" id="bc-home-tri"></div>
      <div class="bc-score" id="bc-home-score">0</div>
      <div class="bc-foul-badge" id="bc-home-fouls">FOULS</div>
    </div>
    <div id="bc-clock-block">
      <div id="bc-clock">12:00</div>
      <div id="bc-period">Q1</div>
    </div>
    <div class="bc-team-block away" id="bc-away-block">
      <div class="bc-tricode" id="bc-away-tri"></div>
      <div class="bc-score" id="bc-away-score">0</div>
      <div class="bc-foul-badge" id="bc-away-fouls">FOULS</div>
    </div>
  </div>
  <div id="bc-momentum-bar"><div id="bc-momentum-fill"></div></div>
  <div id="bc-streak"></div>
  <div id="bc-run-banner"></div>
  <div id="bc-recap">
    <div id="bc-recap-label"></div>
    <div id="bc-recap-score"></div>
  </div>
</div>

<div id="end-card">
  <div id="end-winner"></div>
  <div id="end-score"></div>
  <div id="end-sentence"></div>
  <a id="end-back" href="index.html">← Back to all games</a>
</div>

<script>
// ─── Canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ─── Game data ────────────────────────────────────────────────────────────────
let game = null;

// One curated sentence per game ID
const GAME_SENTENCES = {
  '0041500407': 'Down 3–1. No team had ever come back. Cleveland did.',
  '0021501228': 'In his final game, Kobe Bryant scored 60 points and walked off forever.',
  '0021501226': 'Golden State won their 73rd game, breaking a record that had stood for 21 years.',
  '0021500568': 'A Christmas showdown between the two best teams in basketball.',
  '0042100306': 'Steph Curry scored 43 points and finally won the one thing that had eluded him.',
};

async function loadGame(gameId) {
  const res = await fetch(`data/${gameId}.json`);
  game = await res.json();
  eventIdx = 0; _scoreIdx = 0; _scoreH = 0; _scoreA = 0;
  document.getElementById('start-title').textContent = game.title;
  document.getElementById('start-meta').textContent =
    `${game.awayTeam} vs ${game.homeTeam}  ·  ${game.date}`;
  buildTimeline();
}

// ─── Playback state ───────────────────────────────────────────────────────────
let playing    = false;
let playheadSec = 0;
let speed      = 1;
let lastTs     = null;
let audioCtx   = null;
let endShown   = false;
let eventIdx   = 0; // pointer into game.events for audio punctuation

function gameDuration() { return game ? game.duration : 2880; }

function sampleAt(curve, sec) {
  const idx = Math.min(Math.round(sec / game.sampleRate), curve.length - 1);
  return curve[Math.max(0, idx)];
}

function clockString(sec) {
  const period   = Math.min(Math.floor(sec / 720) + 1, 4);
  const inPeriod = sec % 720;
  const m = Math.floor(inPeriod / 60);
  const s = Math.floor(inPeriod % 60);
  return `Q${period}  ${m}:${s.toString().padStart(2, '0')}`;
}

// ─── Moment label humanizer ───────────────────────────────────────────────────
function humanLabel(km) {
  if (km.type === 'lead_change') {
    // "Lead change  87-89" → "Lead Change"  (score is on screen already)
    return 'Lead Change';
  }
  if (km.type === 'run_start') {
    // "8-0 run" stays, but prefix with team tricode if available
    return km.label;
  }
  if (km.type === 'clutch_shot') return 'Three!';
  if (km.type === 'timeout')     return 'Timeout';
  return km.label;
}

// ─── Particle pool ────────────────────────────────────────────────────────────
const POOL_SIZE = 1000;
const pool = [];
class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x       = Math.random() * (W || 1920);
    this.y       = Math.random() * (H || 1080);
    this.vx      = (Math.random() - 0.5) * 1.5;
    this.vy      = (Math.random() - 0.5) * 1.5;
    this.life    = Math.random();
    this.radius  = 0.8 + Math.random() * 2.2;
    this.trail   = [];
    this.special = Math.random() < 0.04;
  }
}
for (let i = 0; i < POOL_SIZE; i++) pool.push(new Particle());

// ─── Color helpers ────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function lerpColor(a, b, t) {
  return [
    Math.round(a[0] + (b[0] - a[0]) * t),
    Math.round(a[1] + (b[1] - a[1]) * t),
    Math.round(a[2] + (b[2] - a[2]) * t),
  ];
}
function rgbStr(rgb, alpha) {
  return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha.toFixed(3)})`;
}

// Clamp an angle delta to [-max, max], wrapping through [-π, π]
function clampAngle(delta, max) {
  while (delta >  Math.PI) delta -= Math.PI * 2;
  while (delta < -Math.PI) delta += Math.PI * 2;
  return Math.max(-max, Math.min(max, delta));
}

// ─── Color gradient lag ───────────────────────────────────────────────────────
// _displayPrimary / _displaySecondary lag behind the target color at τ≈3s.
// When momentum shifts fast (>0.1/s game-time), briefly overshoot 15% past
// the target before settling — color feels like it has inertia.
let _displayPrimary   = null;  // [r,g,b] — lazy-initialised on first frame
let _displaySecondary = null;
let _prevMomentumForColor = 0;

function updateDisplayColor(targetPrimary, targetSecondary, momentum, dt) {
  const dtSec = dt / 1000;

  if (!_displayPrimary) {
    _displayPrimary   = targetPrimary.slice();
    _displaySecondary = targetSecondary.slice();
    _prevMomentumForColor = momentum;
    return;
  }

  const colorLagTau = 3.0;
  const alpha = 1 - Math.exp(-dtSec / colorLagTau);

  // Detect rapid momentum shift for overshoot
  const momDelta = (momentum - _prevMomentumForColor) / Math.max(dtSec, 0.001);
  const overshoot = Math.abs(momDelta) > 0.1 ? 0.15 * Math.sign(momDelta) : 0;
  _prevMomentumForColor = momentum;

  for (let i = 0; i < 3; i++) {
    const overTarget = targetPrimary[i] + (targetPrimary[i] - _displayPrimary[i]) * overshoot;
    _displayPrimary[i] += (overTarget - _displayPrimary[i]) * alpha;

    const overTarget2 = targetSecondary[i] + (targetSecondary[i] - _displaySecondary[i]) * overshoot;
    _displaySecondary[i] += (overTarget2 - _displaySecondary[i]) * alpha;
  }
}

function resetDisplayColor() {
  _displayPrimary         = null;
  _displaySecondary       = null;
  _prevMomentumForColor   = 0;
}

// ─── Renderer system ─────────────────────────────────────────────────────────
// endSettleT: 0 = normal playback, 1 = fully settled to winner color
let endSettleT   = 0;
let currentMode  = 'minimal'; // 'minimal' | 'anime' | 'cosmic' | 'broadcast'

// Anime-only state
let shakeX = 0, shakeY = 0, shakeTtl = 0;    // screen shake
let flashAlpha  = 0;                           // white flash
let runGlow     = 0;                           // power-up glow intensity (0→1)
let chyronTimer = 0;                           // ms remaining for current chyron
const CHYRON_DURATION = 1800;                  // ms
let _blackFlash = 0;                           // frames of full-black on lead_change

// Anime momentum spring — displays _effectiveMomentum with overshoot
// x: current display value, v: velocity, overshoots when momentum shifts >0.3
let _animeMomX = 0, _animeMomV = 0;
const ANIME_MOM_K = 8.0, ANIME_MOM_DAMP = 0.55;

function updateAnimeMomentumSpring(target, dt) {
  const dtSec = dt / 1000;
  const shift = Math.abs(target - _animeMomX);
  // Large shift: add a kick in the target direction so it overshoots
  if (shift > 0.3) _animeMomV += Math.sign(target - _animeMomX) * shift * 0.5;
  _animeMomV += (target - _animeMomX) * ANIME_MOM_K * dtSec;
  _animeMomV *= Math.pow(ANIME_MOM_DAMP, dtSec * 60);
  _animeMomX += _animeMomV * dtSec;
  _animeMomX  = Math.max(-1.5, Math.min(1.5, _animeMomX));  // allow slight overshoot past ±1
}

// ─── Crowd Heat (effectiveEnergy) ────────────────────────────────────────────
// Crowd Heat adds thresholds, hysteresis, and aftershock decay so energy
// feels like a crowd, not a smooth curve.
let _activationState = false;  // true when crowd heat is "fired up"
let _aftershockPool  = 0.0;    // drains at 0.05/s; compounds on repeated spikes
let _visualResponse  = 0.0;    // smoothed display energy — rises fast, falls slow
let _delayBuffer     = 0.0;    // brief hold before visual reacts (anticipation delay)
let _delayTimer      = 0.0;    // seconds remaining in delay

function updateCrowdHeat(rawEnergy, dt) {
  const dtSec = dt / 1000;

  // Activation with hysteresis: fires above 0.7, only resets below 0.5
  if (rawEnergy > 0.7) {
    _activationState = true;
    _aftershockPool  = Math.min(_aftershockPool + rawEnergy * 0.3, 1.5);
    // Hold the incoming spike in a delay buffer for ~0.3s before passing through
    if (rawEnergy > _delayBuffer) {
      _delayBuffer = rawEnergy;
      _delayTimer  = 0.3;
    }
  } else if (rawEnergy < 0.5) {
    _activationState = false;
  }

  // Drain delay timer; release buffered spike when it expires
  let feedEnergy = rawEnergy;
  if (_delayTimer > 0) {
    _delayTimer -= dtSec;
    feedEnergy = _delayTimer > 0 ? Math.min(rawEnergy, _delayBuffer * 0.5) : _delayBuffer;
    if (_delayTimer <= 0) _delayBuffer = 0;
  }

  // Aftershock drains regardless of activation state
  _aftershockPool = Math.max(0, _aftershockPool - 0.05 * dtSec);

  const effective = Math.max(feedEnergy, _aftershockPool * 0.6);

  // Visual response: rise fast (τ≈0.3s), fall slow (τ≈4s) — asymmetric recovery
  const tau = effective > _visualResponse ? 0.3 : 4.0;
  _visualResponse += (effective - _visualResponse) * (1 - Math.exp(-dtSec / tau));

  return Math.min(1.0, _visualResponse);
}

function resetCrowdHeat() {
  _activationState = false;
  _aftershockPool  = 0;
  _visualResponse  = 0;
  _delayBuffer     = 0;
  _delayTimer      = 0;
}

function triggerShake(intensity) {
  shakeTtl = Math.round(intensity * 18); // frames
  shakeX   = (Math.random() - 0.5) * intensity * 14;
  shakeY   = (Math.random() - 0.5) * intensity * 8;
}

function triggerFlash(alpha) {
  flashAlpha = Math.min(1, flashAlpha + alpha);
}

function triggerRunGlow(intensity) {
  runGlow = Math.max(runGlow, intensity);
}

function showChyron(text, color) {
  const inner = document.getElementById('chyron-inner');
  inner.style.background = color || '#ff4466';
  inner.textContent = text;
  inner.classList.remove('wipe-out');
  void inner.offsetWidth; // force reflow so transition fires
  inner.classList.add('wipe-in');
  chyronTimer = CHYRON_DURATION;
}

function hideChyron() {
  const inner = document.getElementById('chyron-inner');
  inner.classList.remove('wipe-in');
  inner.classList.add('wipe-out');
  chyronTimer = 0;
}

// ─── State memory ────────────────────────────────────────────────────────────
let _momentumMemory  = 0.0;  // ~90s lagged momentum
let _effectiveMomentum = 0.0;
let _highStakes      = false;
let _recentClutchCount = 0;
let _lastClutchT     = -9999;

function updateStateMemory(rawMomentum, dt) {
  const dtSec = dt / 1000;
  // Exponential lag — time constant ≈90s at 1x speed, adjusted for playback speed
  const alpha = 1 - Math.exp(-dtSec * speed / 90);
  _momentumMemory    += (rawMomentum - _momentumMemory) * alpha;
  _effectiveMomentum  = rawMomentum * 0.7 + _momentumMemory * 0.3;
}

function resetStateMemory() {
  _momentumMemory    = 0;
  _effectiveMomentum = 0;
  _highStakes        = false;
  _recentClutchCount = 0;
  _lastClutchT       = -9999;
}

// ─── Tension Memory ───────────────────────────────────────────────────────────
// Accumulates dramatic weight from high-stakes events; decays over ~4 game-minutes.
// Unlike _aftershockPool (crowd reaction) or _momentumMemory (direction), this
// tracks the sustained psychological pressure that lingers after big moments.
let tensionMemory     = 0.0;
let _prevTensionEnergy = 0.0;   // tracks sustained high-energy windows
let _tensionEnergyTimer = 0.0;  // seconds above 0.8 energy (game-time)

function updateTensionMemory(rawEnergy, dt) {
  const dtSec = dt / 1000 * speed;  // game-seconds elapsed
  // Decay: τ ≈ 4 game-minutes (240s)
  tensionMemory *= Math.exp(-dtSec / 240);

  // Charge from sustained high energy: +0.10/s while energy > 0.8 for 10+ seconds
  if (rawEnergy > 0.8) {
    _tensionEnergyTimer += dtSec;
    if (_tensionEnergyTimer >= 10) {
      tensionMemory = Math.min(1.0, tensionMemory + 0.10 * dtSec);
    }
  } else {
    _tensionEnergyTimer = 0;
  }
  _prevTensionEnergy = rawEnergy;
}

function resetTensionMemory() {
  tensionMemory       = 0;
  _prevTensionEnergy  = 0;
  _tensionEnergyTimer = 0;
}

// ─── Director moments ─────────────────────────────────────────────────────────
// Rare, system-triggered interruptions lasting 3-8 real seconds.
// At most one per 90 real seconds. Four types:
//   time_dilation       — clutch_shot, final 90s, margin ≤ 3
//   gravitational_collapse — run_start, 10+ unanswered, tensionMemory > 0.6 (Cosmic only)
//   bass_drop           — lead_change, final 2 min (Anime + Broadcast)
//   exhale              — postPeakSilence trigger (all modes)
let _lastDirectorAt    = -999999;   // real ms timestamp of last director moment
let _dilationTimer     = 0;         // ms remaining at 30% physics speed
let _dilationRelease   = 0;         // ms remaining in 1s snap-back phase
let _freezeFrames      = 0;         // physics frames to skip (bass drop freeze)
let _freezeBoost       = 0;         // 0→1 boost applied to particle velocities post-freeze; decays over 3s
let _collapseActive    = false;
let _collapseTimer     = 0;         // ms remaining in gravitational collapse
let _collapsePhase     = 0;         // 0=lurch-in, 1=explode-out

function resetDirector() {
  _lastDirectorAt  = -999999;
  _dilationTimer   = 0;
  _dilationRelease = 0;
  _freezeFrames    = 0;
  _freezeBoost     = 0;
  _collapseActive  = false;
  _collapseTimer   = 0;
  _collapsePhase   = 0;
}

function triggerDirectorMoment(type) {
  const nowMs = performance.now();
  if (nowMs - _lastDirectorAt < 90000) return;  // 90s cooldown
  _lastDirectorAt = nowMs;

  if (type === 'time_dilation' && currentMode !== 'cosmic') {
    _dilationTimer   = 4000;
    _dilationRelease = 0;
    // Pitch drones down 8% then recover
    if (audioCtx && _drones) {
      const now = audioCtx.currentTime;
      _drones.forEach(d => {
        d.osc.frequency.cancelScheduledValues(now);
        d.osc.frequency.setValueAtTime(d.osc.frequency.value, now);
        d.osc.frequency.exponentialRampToValueAtTime(d.baseFreq * 0.92, now + 0.3);
        d.osc.frequency.exponentialRampToValueAtTime(d.baseFreq,        now + 5.0);
      });
    }
  }

  if (type === 'gravitational_collapse' && currentMode === 'cosmic') {
    _collapseActive = true;
    _collapseTimer  = 3000;
    _collapsePhase  = 0;
  }

  if (type === 'bass_drop' && (currentMode === 'anime' || currentMode === 'broadcast')) {
    _freezeFrames = 2;
    _freezeBoost  = 1.0;
    fireBassThump();
  }

  // exhale: no extra state needed — _postPeakSilence already does the work.
  // The director tag just enforces the 90s cooldown so it doesn't stack.
}

function fireBassThump() {
  if (!audioCtx) return;
  const now  = audioCtx.currentTime;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine'; osc.frequency.value = 40;
  gain.gain.setValueAtTime(0.4, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
  osc.connect(gain); gain.connect(_master);
  osc.start(now); osc.stop(now + 0.2);
}

// ─── Post-peak silence ────────────────────────────────────────────────────────
// After a climax discharges (tension drops steeply), the system enters a brief
// exhale — low particle count, near-silence. Then recovers slowly from center.
let _postPeakSilence   = false;
let _postPeakTimer     = 0;      // real ms remaining in silence
let _postPeakRecovery  = 0;      // 0→1 during recovery phase (6-10s)
let _prevTension       = 0;      // tension from previous frame, for drop detection

function resetPostPeak() {
  _postPeakSilence  = false;
  _postPeakTimer    = 0;
  _postPeakRecovery = 0;
  _prevTension      = 0;
}

function updatePostPeak(dt) {
  const tensionDrop = _prevTension - tensionMemory;

  // Trigger: tension fell >0.3 within one frame AND is now below 0.4 — climax just exhaled
  if (tensionDrop > 0.3 && tensionMemory < 0.4 && !_postPeakSilence && _postPeakRecovery === 0) {
    _postPeakSilence = true;
    _postPeakTimer   = 8000 + Math.random() * 7000;  // 8–15 real seconds
    triggerDirectorMoment('exhale');
  }

  if (_postPeakSilence) {
    _postPeakTimer -= dt;
    if (_postPeakTimer <= 0) {
      _postPeakSilence  = false;
      _postPeakRecovery = 0.001;  // kick off recovery
    }
  }

  // Recovery: 0→1 over 6–10 real seconds
  if (_postPeakRecovery > 0 && _postPeakRecovery < 1) {
    _postPeakRecovery = Math.min(1, _postPeakRecovery + dt / 8000);
    if (_postPeakRecovery >= 1) _postPeakRecovery = 0;  // done recovering
  }

  _prevTension = tensionMemory;
}

// ─── Scene logic ─────────────────────────────────────────────────────────────
// Four scene states with distinct visual + audio grammar.
// Transitions dissolve over 4-8 real seconds via _sceneT lerp.
const SCENE = { NEUTRAL: 0, TENSION: 1, CLIMAX: 2, AFTERMATH: 3 };
let _currentScene = SCENE.NEUTRAL;
let _sceneT       = 1.0;   // 0→1: blend progress from previous scene to current
let _prevScene    = SCENE.NEUTRAL;

function computeScene() {
  if (!game) return;
  const timeLeft   = gameDuration() - playheadSec;
  const { h, a }   = findScore(playheadSec);
  const margin     = Math.abs(h - a);
  const closeGame  = margin < 5;
  const blowout    = margin > 18;
  const finalFour  = timeLeft < 240;

  let target;
  if (_postPeakSilence || blowout) {
    target = SCENE.AFTERMATH;
  } else if (finalFour && closeGame) {
    target = SCENE.CLIMAX;
  } else if (closeGame && tensionMemory > 0.4) {
    target = SCENE.TENSION;
  } else {
    target = SCENE.NEUTRAL;
  }

  if (target !== _currentScene) {
    _prevScene    = _currentScene;
    _currentScene = target;
    _sceneT       = 0;
  }

  // Dissolve: 4-8s depending on how dramatic the transition is
  const transitionSec = (_currentScene === SCENE.CLIMAX || _currentScene === SCENE.AFTERMATH) ? 4000 : 6000;
  if (_sceneT < 1) _sceneT = Math.min(1, _sceneT + 16.67 / transitionSec);
}

function resetScene() {
  _currentScene = SCENE.NEUTRAL;
  _sceneT       = 1.0;
  _prevScene    = SCENE.NEUTRAL;
}

// Per-scene visual params: [spreadMul, desaturation, bgDarken]
// spreadMul   — multiplier on centering force (>1 = dispersed, <1 = clustered)
// desaturation — 0=full color, 1=grayscale
// bgDarken    — extra canvas fill alpha added on top of base
const _SCENE_VISUALS = {
  [SCENE.NEUTRAL]:   { spread: 1.0,  desat: 0.0,  bgDark: 0.0  },
  [SCENE.TENSION]:   { spread: 0.85, desat: 0.20, bgDark: 0.03 },
  [SCENE.CLIMAX]:    { spread: 0.60, desat: 0.70, bgDark: 0.06 },
  [SCENE.AFTERMATH]: { spread: 1.2,  desat: 0.40, bgDark: 0.0  },
};

function getSceneParams() {
  const cur  = _SCENE_VISUALS[_currentScene];
  const prev = _SCENE_VISUALS[_prevScene];
  const t    = _sceneT;
  return {
    spread:  prev.spread  + (cur.spread  - prev.spread)  * t,
    desat:   prev.desat   + (cur.desat   - prev.desat)   * t,
    bgDark:  prev.bgDark  + (cur.bgDark  - prev.bgDark)  * t,
  };
}

// Desaturate an rgb object toward gray by `amount` (0=no change, 1=full gray)
function desaturateRgb(rgb, amount) {
  if (amount <= 0) return rgb;
  const gray = rgb.r * 0.299 + rgb.g * 0.587 + rgb.b * 0.114;
  return {
    r: Math.round(rgb.r + (gray - rgb.r) * amount),
    g: Math.round(rgb.g + (gray - rgb.g) * amount),
    b: Math.round(rgb.b + (gray - rgb.b) * amount),
  };
}

// Called from checkMoments when a clutch/lead-change fires
function noteClutchMoment() {
  const now = playheadSec;
  if (now - _lastClutchT < 180) {  // within 3 game-minutes
    _recentClutchCount++;
    if (_recentClutchCount >= 2) _highStakes = true;
  } else {
    _recentClutchCount = 1;
  }
  _lastClutchT = now;
}

// ─── Shared simulation ────────────────────────────────────────────────────────
function simulateAndGetParams(dt) {
  let rawMomentum = sampleAt(game.momentumCurve, playheadSec);
  let rawEnergy   = sampleAt(game.energyCurve,   playheadSec);

  if (endSettleT > 0) {
    const winnerMomentum = game.finalScore.away > game.finalScore.home ? 1 : -1;
    rawMomentum = rawMomentum + (winnerMomentum - rawMomentum) * endSettleT;
    rawEnergy   = rawEnergy   * (1 - endSettleT * 0.6);
  }

  // Director: advance dilation timer; compute effective dt for physics
  let physicsDt = dt;
  if (_freezeFrames > 0) {
    _freezeFrames--;
    // On the frame freeze ends, double all particle velocities
    if (_freezeFrames === 0) {
      for (let i = 0; i < POOL_SIZE; i++) { pool[i].vx *= 2; pool[i].vy *= 2; }
    }
    // Skip physics this frame — particles are frozen
    updateStateMemory(rawMomentum, dt);
    updateCrowdHeat(rawEnergy, dt);
    updateTensionMemory(rawEnergy, dt);
    updatePostPeak(dt);
    const tP = (rawMomentum + 1) / 2;
    const tgtP = lerpColor(hexToRgb(game.homeColor), hexToRgb(game.awayColor), tP);
    const tgtS = lerpColor(hexToRgb(game.homeColorSecondary), hexToRgb(game.awayColorSecondary), tP);
    updateDisplayColor(tgtP, tgtS, rawMomentum, dt);
    const pr = _displayPrimary ? _displayPrimary.map(Math.round) : tgtP;
    const sc = _displaySecondary ? _displaySecondary.map(Math.round) : tgtS;
    const ac = Math.min(1000, Math.max(80, Math.round(150 + rawEnergy * 850)));
    return { momentum: rawMomentum, energy: rawEnergy, rawEnergy, primary: pr, secondary: sc,
             activeCount: ac, tensionMemory, postPeakSilence: _postPeakSilence, postPeakRecovery: _postPeakRecovery };
  }
  if (_dilationTimer > 0) {
    _dilationTimer -= dt;
    if (_dilationTimer <= 0) { _dilationTimer = 0; _dilationRelease = 1000; }
    physicsDt = dt * 0.3;
  } else if (_dilationRelease > 0) {
    _dilationRelease -= dt;
    // Ease physics speed from 30% back to 100% over 1s
    const easeT  = Math.max(0, _dilationRelease / 1000);
    physicsDt    = dt * (0.3 + 0.7 * (1 - easeT));
    if (_dilationRelease <= 0) _dilationRelease = 0;
  }
  // Freeze-boost decays: particles gradually return to normal speed over 3s
  if (_freezeBoost > 0) {
    _freezeBoost = Math.max(0, _freezeBoost - dt / 3000);
  }

  // State memory — updates _effectiveMomentum
  updateStateMemory(rawMomentum, physicsDt);
  const momentum = _effectiveMomentum;

  // Crowd Heat — effectiveEnergy with aftershock + hysteresis
  const energy = updateCrowdHeat(rawEnergy, physicsDt);

  // Tension Memory — slow-decay dramatic weight; also charges from sustained high energy
  updateTensionMemory(rawEnergy, physicsDt);

  // Post-peak silence — detects tension discharge, manages exhale + recovery timing
  updatePostPeak(physicsDt);

  // highStakes adds a subtle persistent energy floor
  const baselineEnergy = _highStakes ? Math.max(energy, 0.35) : energy;

  const homeRgb  = hexToRgb(game.homeColor);
  const awayRgb  = hexToRgb(game.awayColor);
  const homeRgb2 = hexToRgb(game.homeColorSecondary);
  const awayRgb2 = hexToRgb(game.awayColorSecondary);
  const t              = (momentum + 1) / 2;
  const targetPrimary  = lerpColor(homeRgb,  awayRgb,  t);
  const targetSecondary = lerpColor(homeRgb2, awayRgb2, t);

  // Color gradient lag: _displayPrimary trails the target at τ=3s with overshoot
  updateDisplayColor(targetPrimary, targetSecondary, momentum, dt);
  const primary   = _displayPrimary   ? _displayPrimary.map(Math.round)   : targetPrimary;
  const secondary = _displaySecondary ? _displaySecondary.map(Math.round) : targetSecondary;

  // Gravity: direction shifts toward the leading team's side of the canvas
  // momentum > 0 → away team leads → pull rightward; < 0 → home → leftward
  const gravX = momentum * 0.8;  // physics constant, not a UI scale
  const gravY = 0;

  // Dead space floor climbs 80→160 at peak tension — even quiet moments feel charged
  const deadSpaceFloor = Math.round(80 + tensionMemory * 80);
  // Rare overload: when aftershock is saturated (>1.2) briefly allow up to 1800 particles
  const overloadCap = _aftershockPool > 1.2 ? 1800 : 1000;
  let activeCount = Math.min(overloadCap, Math.max(deadSpaceFloor, Math.round(150 + baselineEnergy * 850)));

  // Post-peak silence overrides: drop to 40-60 particles; recovery re-emerges from 40→normal
  if (_postPeakSilence) {
    activeCount = Math.round(40 + Math.random() * 20);
  } else if (_postPeakRecovery > 0) {
    const recoveryTarget = Math.min(overloadCap, Math.max(deadSpaceFloor, Math.round(150 + baselineEnergy * 850)));
    activeCount = Math.round(40 + _postPeakRecovery * (recoveryTarget - 40));
  }

  const maxSpeed    = 1.5 + baselineEnergy * 4;

  for (let i = 0; i < POOL_SIZE; i++) {
    const p = pool[i];
    const maxTrail = currentMode === 'anime' ? Math.round(6 + baselineEnergy * 22) : Math.round(2 + baselineEnergy * 6);
    if (i >= activeCount) { p.trail = []; continue; }

    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > maxTrail) p.trail.shift();

    // Inertia: particles on the trailing team's half are heavier (damped more)
    const pSide = p.x < W / 2 ? -1 : 1;  // -1=home side, +1=away side
    const isTrailing = (momentum > 0 && pSide < 0) || (momentum < 0 && pSide > 0);
    const damping = isTrailing ? 0.97 : 1.0;  // trailing side drags

    // During silence particles drift toward zero — exhale, barely moving
    // During recovery they re-emerge from center with growing influence
    const silenceScale  = _postPeakSilence ? 0.0 : (_postPeakRecovery > 0 ? _postPeakRecovery : 1.0);
    const recoveryCentering = _postPeakRecovery > 0 ? (1 - _postPeakRecovery) * 0.004 : 0;

    // Direction resistance: velocity heading rotates toward gravity target at a
    // capped rate — trailing particles are heavier and turn more slowly.
    const dtSec = physicsDt / 1000;
    const spd0  = Math.hypot(p.vx, p.vy);
    if (spd0 > 0.01 && (gravX !== 0 || gravY !== 0)) {
      const targetAngle  = Math.atan2(gravY, gravX);
      const currentAngle = Math.atan2(p.vy, p.vx);
      const maxTurn      = (isTrailing ? 0.8 : 2.0) * dtSec * silenceScale;
      const turn         = clampAngle(targetAngle - currentAngle, maxTurn);
      const cos = Math.cos(turn), sin = Math.sin(turn);
      const nvx = p.vx * cos - p.vy * sin;
      const nvy = p.vx * sin + p.vy * cos;
      p.vx = nvx;
      p.vy = nvy;
    }

    p.vx = p.vx * (damping * (0.92 + silenceScale * 0.08))
         + (Math.random() - 0.5) * 0.25 * baselineEnergy * silenceScale
         - p.vx * (1 - silenceScale) * 0.05;
    p.vy = p.vy * (damping * (0.92 + silenceScale * 0.08))
         + (Math.random() - 0.5) * 0.25 * baselineEnergy * silenceScale
         - p.vy * (1 - silenceScale) * 0.05;
    // Pull toward center during recovery
    p.vx += (W / 2 - p.x) * recoveryCentering;
    p.vy += (H / 2 - p.y) * recoveryCentering;
    // Soft centering force — scene spread inverts it (CLIMAX clusters, AFTERMATH disperses)
    const sceneCenter = 0.0003 / Math.max(0.3, getSceneParams().spread);
    p.vx += (W / 2 - p.x) * sceneCenter;
    p.vy += (H / 2 - p.y) * sceneCenter;

    const spd = Math.hypot(p.vx, p.vy);
    if (spd > maxSpeed) { p.vx = p.vx / spd * maxSpeed; p.vy = p.vy / spd * maxSpeed; }

    // Freeze-boost: damp velocity back toward normal over 3s after bass drop
    if (_freezeBoost > 0) {
      p.vx *= (1 - _freezeBoost * 0.02);
      p.vy *= (1 - _freezeBoost * 0.02);
    }

    p.x += p.vx * physicsDt / 16.67;
    p.y += p.vy * physicsDt / 16.67;
    p.life += 0.005 * physicsDt / 16.67;

    if (p.x < -20) p.x = W + 20;
    if (p.x > W+20) p.x = -20;
    if (p.y < -20) p.y = H + 20;
    if (p.y > H+20) p.y = -20;
  }

  return { momentum, energy: baselineEnergy, rawEnergy, primary, secondary, activeCount, tensionMemory,
           postPeakSilence: _postPeakSilence, postPeakRecovery: _postPeakRecovery };
}

// ─── Per-mode signal shaping ─────────────────────────────────────────────────
// Each mode bends the raw signals differently before passing to its renderer.

// Minimal: slow response (τ≈2s rise), long decay (τ≈6s fall)
let _minEnvEnergy = 0, _minEnvMomentum = 0;
function shapeMinimal(energy, momentum, dt) {
  const dtSec = dt / 1000;
  const eRise = 1 - Math.exp(-dtSec / 2.0);
  const eFall = 1 - Math.exp(-dtSec / 6.0);
  const eTau  = energy > _minEnvEnergy ? eRise : eFall;
  _minEnvEnergy   += (energy   - _minEnvEnergy)   * eTau;
  _minEnvMomentum += (momentum - _minEnvMomentum) * (1 - Math.exp(-dtSec / 3.0));
  return { energy: _minEnvEnergy, momentum: _minEnvMomentum };
}

// Anime: exaggerated spikes — energy^0.6 compresses low end, stretches highs
// Momentum goes through an overshoot spring so big shifts feel physical.
let _animeFreeze = 0;  // frames remaining in frame-freeze
function shapeAnime(energy, momentum, dt) {
  const e = Math.pow(Math.max(0, energy), 0.6);
  updateAnimeMomentumSpring(momentum, dt);
  return { energy: e, momentum: _animeMomX };
}

// Cosmic: uses raw signals — mode diverges through shader uniforms, not here

// Broadcast: discrete updates — energy/momentum only move on scoring events
let _bcDiscreteEnergy = 0, _bcDiscreteMomentum = 0, _bcLastEventT = -1;
function shapeBroadcast(energy, momentum) {
  // Snap to actual values only when a new event has just fired
  if (_scoreIdx !== _bcLastEventT) {
    _bcDiscreteEnergy   = energy;
    _bcDiscreteMomentum = momentum;
    _bcLastEventT       = _scoreIdx;
  }
  return { energy: _bcDiscreteEnergy, momentum: _bcDiscreteMomentum };
}

// ─── Minimalist renderer ──────────────────────────────────────────────────────
function drawMinimal(dt) {
  const raw = simulateAndGetParams(dt);
  // Minimal: slow-response shaped energy for all drawing — physics already ran with real values
  const shaped  = shapeMinimal(raw.energy, raw.momentum, dt);
  const { activeCount } = raw;
  const energy  = shaped.energy;
  const sp      = getSceneParams();
  const primary   = desaturateRgb(raw.primary,   sp.desat);
  const secondary = desaturateRgb(raw.secondary, sp.desat);

  ctx.fillStyle = `rgba(0,0,0,${0.18 - energy * 0.05 + raw.tensionMemory * 0.05 + sp.bgDark})`;
  ctx.fillRect(0, 0, W, H);

  if (energy > 0.15 && !raw.postPeakSilence) {
    const glowScale = raw.postPeakRecovery > 0 ? raw.postPeakRecovery : 1;
    const r   = Math.min(W, H) * 0.55;
    const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, r);
    grd.addColorStop(0, rgbStr(primary, energy * 0.07 * glowScale));
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
  }

  const maxSpecial = Math.floor(activeCount * 0.05);
  let specialDrawn = 0;

  for (let i = 0; i < activeCount; i++) {
    const p     = pool[i];
    // Background particles: alpha hard-capped at 0.35 so they never compete with foreground
    const alpha = Math.min(0.35, (0.25 + energy * 0.55) * (0.6 + 0.4 * Math.sin(p.life * Math.PI * 2)));

    if (p.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let j = 1; j < p.trail.length; j++) ctx.lineTo(p.trail[j].x, p.trail[j].y);
      ctx.strokeStyle = rgbStr(secondary, alpha * 0.3);
      ctx.lineWidth   = p.radius * 0.6;
      ctx.stroke();
    }

    // Special glow: cap at 5% of active count for visual scarcity
    if (p.special && energy > 0.4 && specialDrawn < maxSpecial) {
      specialDrawn++;
      const gr = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 9);
      gr.addColorStop(0, rgbStr(primary, 0.4));
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * 9, 0, Math.PI * 2);
      ctx.fillStyle = gr;
      ctx.fill();
      // Foreground dot gets full alpha — dominant signal
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * (1 + energy * 0.4), 0, Math.PI * 2);
      ctx.fillStyle = rgbStr(primary, 0.8);
      ctx.fill();
      continue;
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * (1 + energy * 0.4), 0, Math.PI * 2);
    ctx.fillStyle = rgbStr(primary, alpha);
    ctx.fill();
  }
}

// ─── Anime renderer ───────────────────────────────────────────────────────────
function drawAnime(dt) {
  // Frame-freeze: skip physics+draw for a few frames on big hits, then burst
  if (_animeFreeze > 0) { _animeFreeze--; return; }

  // Black flash: 2-frame full-black cut on lead_change (camera-cut feel)
  if (_blackFlash > 0) {
    _blackFlash--;
    ctx.fillStyle = 'rgb(0,0,0)';
    ctx.fillRect(0, 0, W, H);
    return;
  }

  const raw    = simulateAndGetParams(dt);
  const shaped = shapeAnime(raw.energy, raw.momentum, dt);
  const { activeCount } = raw;
  const energy   = shaped.energy;
  const momentum = shaped.momentum;
  const sp        = getSceneParams();
  const primary   = desaturateRgb(raw.primary,   sp.desat);
  const secondary = desaturateRgb(raw.secondary, sp.desat);

  // Advance shake
  if (shakeTtl > 0) {
    shakeTtl--;
    shakeX *= 0.75;
    shakeY *= 0.75;
    if (shakeTtl === 0) { shakeX = 0; shakeY = 0; }
  }

  // Decay run glow and flash
  runGlow    = Math.max(0, runGlow    - 0.008 * dt / 16.67);
  flashAlpha = Math.max(0, flashAlpha - 0.05  * dt / 16.67);

  // Advance chyron
  if (chyronTimer > 0) {
    chyronTimer -= dt;
    if (chyronTimer <= 0) hideChyron();
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Dark trail fade — less transparent than minimal so trails burn in harder
  ctx.fillStyle = `rgba(0,0,0,${0.12 - energy * 0.04 + raw.tensionMemory * 0.05 + sp.bgDark})`;
  ctx.fillRect(-20, -20, W + 40, H + 40);

  // Vivid central glow — suppressed during post-peak silence
  if (energy > 0.1 && !raw.postPeakSilence) {
    const glowScale = raw.postPeakRecovery > 0 ? raw.postPeakRecovery : 1;
    const r   = Math.min(W, H) * 0.7;
    const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, r);
    grd.addColorStop(0, rgbStr(primary, energy * 0.14 * glowScale));
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(-20, -20, W + 40, H + 40);
  }

  for (let i = 0; i < activeCount; i++) {
    const p     = pool[i];
    // More vivid, less subtly pulsing
    const alpha = 0.45 + energy * 0.5;

    // Speed-line trail: two strokes — thin full trail + thick near-tip
    if (p.trail.length > 1) {
      // Full trail (thin, faded)
      ctx.beginPath();
      ctx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let j = 1; j < p.trail.length; j++) ctx.lineTo(p.trail[j].x, p.trail[j].y);
      ctx.strokeStyle = rgbStr(secondary, alpha * 0.18);
      ctx.lineWidth   = p.radius * 0.5;
      ctx.stroke();
      // Bright tip segment (last 30% of trail)
      const tipStart = Math.max(0, Math.floor(p.trail.length * 0.7));
      if (tipStart < p.trail.length - 1) {
        ctx.beginPath();
        ctx.moveTo(p.trail[tipStart].x, p.trail[tipStart].y);
        for (let j = tipStart + 1; j < p.trail.length; j++) ctx.lineTo(p.trail[j].x, p.trail[j].y);
        ctx.strokeStyle = rgbStr(secondary, alpha * 0.65);
        ctx.lineWidth   = p.radius * 1.6;
        ctx.stroke();
      }
    }

    // Power-up bloom halo on all particles during a run
    if (runGlow > 0.05) {
      const glowR = p.radius * (6 + runGlow * 14);
      const gr = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
      gr.addColorStop(0, rgbStr(primary, runGlow * 0.35));
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = gr;
      ctx.fill();
    }

    // Particle dot — larger and sharper than minimal
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * (1.5 + energy * 0.8), 0, Math.PI * 2);
    ctx.fillStyle = rgbStr(primary, alpha);
    ctx.fill();
  }

  // Radial speed lines on big events (impact frame)
  if (flashAlpha > 0.05) {
    // Full-screen flash layer
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha * 0.18})`;
    ctx.fillRect(-20, -20, W + 40, H + 40);

    // Radial lines from center
    const lineCount = 24;
    const maxLen    = Math.min(W, H) * 0.55 * flashAlpha;
    ctx.save();
    ctx.translate(W / 2, H / 2);
    for (let i = 0; i < lineCount; i++) {
      const angle = (i / lineCount) * Math.PI * 2;
      const len   = maxLen * (0.5 + Math.random() * 0.5);
      ctx.beginPath();
      ctx.moveTo(Math.cos(angle) * 30, Math.sin(angle) * 30);
      ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
      ctx.strokeStyle = rgbStr(primary, flashAlpha * 0.6);
      ctx.lineWidth   = 1.5 + flashAlpha * 3;
      ctx.stroke();
    }
    ctx.restore();
  }

  ctx.restore(); // undo shake translate
}

function renderFrame(dt) {
  if (!game) return;
  if (currentMode === 'anime')       drawAnime(dt);
  else if (currentMode === 'cosmic') drawCosmic(dt);
  else if (currentMode === 'broadcast') drawBroadcast(dt);
  else                               drawMinimal(dt);
}

// ─── Score UI ─────────────────────────────────────────────────────────────────
let _scoreH = 0, _scoreA = 0, _scoreIdx = 0;

function findScore(sec) {
  return { h: _scoreH, a: _scoreA };
}

function advanceScore(sec) {
  const events = game.events;
  while (_scoreIdx < events.length && events[_scoreIdx].t <= sec) {
    const e = events[_scoreIdx];
    if (e.homeScore > 0 || e.awayScore > 0) { _scoreH = e.homeScore; _scoreA = e.awayScore; }
    _scoreIdx++;
  }
}

function updateScoreUI() {
  const { h, a } = findScore(playheadSec);
  document.getElementById('score-line').textContent = `${game.homeTeam}  ${h} — ${a}  ${game.awayTeam}`;
  document.getElementById('clock-line').textContent = clockString(playheadSec);
  const pct = playheadSec / gameDuration() * 100;
  document.getElementById('timeline-fill').style.width = pct + '%';
  document.getElementById('timeline-thumb').style.left  = pct + '%';
  document.getElementById('time-readout').textContent   = clockString(playheadSec);
}

// ─── Moment overlays ──────────────────────────────────────────────────────────
let lastMomentIdx = -1;
const overlay = document.getElementById('moment-overlay');

function checkMoments() {
  if (!game.keyMoments.length) return;
  const windowSec = 20; // game-seconds to show each overlay (≈1 real-sec at 1x)
  for (let i = 0; i < game.keyMoments.length; i++) {
    const km   = game.keyMoments[i];
    const diff = playheadSec - km.t;
    if (diff >= 0 && diff < windowSec) {
      if (lastMomentIdx !== i) {
        lastMomentIdx = i;
        if (currentMode === 'minimal') {
          document.getElementById('moment-label').textContent = clockString(km.t);
          document.getElementById('moment-text').textContent  = humanLabel(km);
          overlay.classList.remove('fade-out');
          overlay.style.opacity = 1;
        }
        if (km.type === 'clutch_shot' || km.type === 'lead_change') noteClutchMoment();
        fireMomentAudio(km);
      }
      return;
    }
  }
  if (lastMomentIdx !== -1) {
    if (currentMode === 'minimal') { overlay.classList.add('fade-out'); overlay.style.opacity = 0; }
    lastMomentIdx = -1;
  }
}

// ─── End card ─────────────────────────────────────────────────────────────────
function showEndCard() {
  if (endShown) return;
  endShown = true;
  playing  = false;
  document.getElementById('play-btn').textContent = '▶';

  const { home, away } = game.finalScore;
  const winnerTeam = home > away ? game.homeTeam : game.awayTeam;
  document.getElementById('end-winner').textContent  = `${winnerTeam} Win`;
  document.getElementById('end-score').textContent   = `${game.homeTeam}  ${home} — ${away}  ${game.awayTeam}`;
  document.getElementById('end-sentence').textContent = GAME_SENTENCES[game.gameId] || game.subtitle;

  const card = document.getElementById('end-card');
  card.classList.add('visible');

  // Gradually settle particles to winner color
  let t = 0;
  const settle = setInterval(() => {
    t = Math.min(t + 0.01, 1);
    endSettleT = t;
    if (t >= 1) clearInterval(settle);
  }, 50);
}

// ─── Timeline ─────────────────────────────────────────────────────────────────
function buildTimeline() {
  const track = document.getElementById('timeline-track');
  track.querySelectorAll('.moment-tick').forEach(el => el.remove());

  const typeColor = {
    lead_change: '#888',
    run_start:   '#e8a020',
    clutch_shot: '#e05050',
    timeout:     '#5580aa',
  };

  game.keyMoments.forEach(km => {
    const pct  = km.t / game.duration * 100;
    const tick = document.createElement('div');
    tick.className        = 'moment-tick';
    tick.style.left       = pct + '%';
    tick.style.background = typeColor[km.type] || '#888';
    tick.setAttribute('data-label', humanLabel(km));
    tick.addEventListener('click', e => { e.stopPropagation(); seek(km.t); });
    track.appendChild(tick);
  });
}

// ─── Audio ────────────────────────────────────────────────────────────────────
// Four independent layers: ambient, momentum-tonality, chaos, clutch.
let _chaosTail = 0;  // independent decay tail so chaos noise lingers after toBurst drops
let _master, _conv, _duck;
let _drones;                    // ambient layer oscillators
let _heartbeat, _heartGain;     // clutch layer heartbeat
let _chaosGain, _chaosNoise;    // chaos layer
let _clutchComp;                // clutch compressor (inserted when final 4 min)
let _compActive = false;
let _lastDroneModT = 0;

// Minor/major/suspended voicings (cent offsets per drone) keyed by tonality
const TONALITY = {
  minor:     [ -14,  10, -14,  10],   // home dominant — darker
  suspended: [   0,   0,   0,   0],   // tied
  major:     [  14, -10,  14, -10],   // away dominant — brighter
};

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // ── Shared reverb ───────────────────────────────────────────────
  _conv = audioCtx.createConvolver();
  const convGain = audioCtx.createGain();
  convGain.gain.value = 0.3;
  const rate = audioCtx.sampleRate;
  const irBuf = audioCtx.createBuffer(2, rate * 2.5, rate);
  for (let ch = 0; ch < 2; ch++) {
    const d = irBuf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 3);
  }
  _conv.buffer = irBuf;

  // ── Master → destination ────────────────────────────────────────
  _master = audioCtx.createGain();
  _master.gain.value = 0;
  _conv.connect(convGain); convGain.connect(_master);
  _master.connect(audioCtx.destination);
  _master.gain.linearRampToValueAtTime(0.28, audioCtx.currentTime + 2);

  // ── Duck (timeouts) ─────────────────────────────────────────────
  _duck = audioCtx.createGain();
  _duck.gain.value = 1;
  _duck.connect(_master);

  // ── Layer 1: Ambient drones (always present) ────────────────────
  // Four sine/triangle oscillators, bass → mid. Constant floor, never silent.
  _drones = [55, 82.4, 110, 164.8].map((f, i) => {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filt = audioCtx.createBiquadFilter();
    osc.type = i % 2 === 0 ? 'sine' : 'triangle';
    osc.frequency.value = f;
    filt.type = 'lowpass'; filt.frequency.value = 400;
    gain.gain.value = 0.04 - i * 0.008;
    osc.connect(filt); filt.connect(gain);
    gain.connect(_duck); gain.connect(_conv);
    osc.start();
    return { osc, gain, filt, baseFreq: f };
  });

  // ── Layer 2: Momentum tonality lives in updateAudio (detune scheduling) ──

  // ── Layer 3: Chaos layer (turnover bursts) ───────────────────────
  // Filtered noise gated by toBurst — sounds like static, adds rhythm complexity
  const noiseLen = audioCtx.sampleRate * 2;
  const noiseBuf = audioCtx.createBuffer(1, noiseLen, audioCtx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i = 0; i < noiseLen; i++) nd[i] = Math.random() * 2 - 1;
  _chaosNoise = audioCtx.createBufferSource();
  _chaosNoise.buffer = noiseBuf;
  _chaosNoise.loop = true;
  const chaosFilt = audioCtx.createBiquadFilter();
  chaosFilt.type = 'bandpass'; chaosFilt.frequency.value = 200; chaosFilt.Q.value = 3;
  _chaosGain = audioCtx.createGain();
  _chaosGain.gain.value = 0;
  _chaosNoise.connect(chaosFilt); chaosFilt.connect(_chaosGain); _chaosGain.connect(_duck);
  _chaosNoise.start();

  // ── Layer 4: Clutch compressor (final 4 min) ─────────────────────
  // Inserted between duck and master when clutch time begins.
  // Makes everything quieter but more present — pressure you feel, not hear.
  _clutchComp = audioCtx.createDynamicsCompressor();
  _clutchComp.threshold.value = -18;
  _clutchComp.knee.value = 6;
  _clutchComp.ratio.value = 6;
  _clutchComp.attack.value = 0.08;
  _clutchComp.release.value = 0.6;

  // ── Heartbeat (clutch layer) ─────────────────────────────────────
  const hOsc  = audioCtx.createOscillator();
  _heartGain  = audioCtx.createGain();
  const hFilt = audioCtx.createBiquadFilter();
  hOsc.type = 'sine'; hOsc.frequency.value = 50;
  hFilt.type = 'lowpass'; hFilt.frequency.value = 80;
  _heartGain.gain.value = 0;
  hOsc.connect(hFilt); hFilt.connect(_heartGain); _heartGain.connect(_master);
  hOsc.start();
  _heartbeat = { osc: hOsc, filt: hFilt };
}

// Fire a one-shot pluck (karplus-strong approximation via filtered noise burst)
function firePluck(freq, vol) {
  if (!audioCtx) return;
  const now  = audioCtx.currentTime;
  const buf  = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;

  const src  = audioCtx.createBufferSource();
  const filt = audioCtx.createBiquadFilter();
  const gain = audioCtx.createGain();
  src.buffer = buf;
  filt.type  = 'bandpass'; filt.frequency.value = freq; filt.Q.value = 12;
  gain.gain.setValueAtTime(vol, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
  src.connect(filt); filt.connect(gain); gain.connect(_master); gain.connect(_conv);
  src.start(now);
}

// Anime mode: aggressive sawtooth pluck with pitch drop
function fireImpactPluck(freq, vol) {
  if (!audioCtx) return;
  const now  = audioCtx.currentTime;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const dist = audioCtx.createWaveShaper();
  // Mild soft-clip waveshaper
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) { const x = i * 2 / 255 - 1; curve[i] = (3 + 20) * x / (Math.PI + 20 * Math.abs(x)); }
  dist.curve = curve;
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(freq * 1.5, now);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.7, now + 0.15);
  gain.gain.setValueAtTime(vol, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
  osc.connect(dist); dist.connect(gain); gain.connect(_master); gain.connect(_conv);
  osc.start(now); osc.stop(now + 0.55);
}

// Fire a short sharp transient (turnover / block)
function fireTransient(vol) {
  if (!audioCtx) return;
  const now  = audioCtx.currentTime;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type   = 'sawtooth'; osc.frequency.value = 180;
  gain.gain.setValueAtTime(vol, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  osc.connect(gain); gain.connect(_master);
  osc.start(now); osc.stop(now + 0.1);
}

// Fire a rising swell (big run)
function fireSwell(vol) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  [110, 165, 220].forEach((f, i) => {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type   = 'sine'; osc.frequency.value = f;
    gain.gain.setValueAtTime(0, now + i * 0.12);
    gain.gain.linearRampToValueAtTime(vol * (1 - i * 0.25), now + i * 0.12 + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 1.5);
    osc.connect(gain); gain.connect(_master); gain.connect(_conv);
    osc.start(now + i * 0.12); osc.stop(now + i * 0.12 + 1.8);
  });
}

// Modulate drone pitches for a lead-change feel (brief dissonance then resolve)
function fireLeadChangeMod() {
  if (!audioCtx || !_drones) return;
  const now = audioCtx.currentTime;
  _drones.forEach((d, i) => {
    const shift = i % 2 === 0 ? -25 : 20;
    d.osc.detune.cancelScheduledValues(now);
    d.osc.detune.setValueAtTime(shift, now);
    d.osc.detune.linearRampToValueAtTime(0, now + 2.5);
  });
}

// Per-event audio punctuation — called once per event as playhead crosses it
function fireEventAudio(evt) {
  const energy = game ? sampleAt(game.energyCurve, playheadSec) : 0;

  if (evt.type === 'score') {
    if (audioCtx && playing) {
      const freq = evt.team === 'home' ? 440 + evt.scoreDelta * 40 : 220 + evt.scoreDelta * 20;
      // Anime: sawtooth pluck for more aggression; minimal: sine pluck
      if (currentMode === 'anime') {
        fireImpactPluck(freq, 0.07 + energy * 0.09);
      } else {
        firePluck(freq, 0.06 + energy * 0.08);
      }
    }
    if (currentMode === 'anime' && evt.scoreDelta >= 3) {
      triggerShake(0.4 + energy * 0.5);
      triggerFlash(0.3 + energy * 0.3);
    }
    if (currentMode === 'cosmic' && evt.scoreDelta >= 3) {
      triggerCosmicWave(0.4 + energy * 0.5);
    }
  } else if (evt.type === 'turnover') {
    if (audioCtx && playing) fireTransient(0.05 + energy * 0.06);
    if (currentMode === 'anime') { triggerShake(0.3); triggerFlash(0.15); }
    if (currentMode === 'cosmic') triggerCosmicWave(0.25);
  } else if (evt.type === 'timeout') {
    if (audioCtx && playing && _duck) {
      const now = audioCtx.currentTime;
      _duck.gain.cancelScheduledValues(now);
      _duck.gain.setValueAtTime(_duck.gain.value, now);
      _duck.gain.linearRampToValueAtTime(0.1, now + 0.3);
      _duck.gain.linearRampToValueAtTime(1.0, now + 3.5);
    }
  }
}

// Called by checkMoments when a key moment is newly entered
function fireMomentAudio(km) {
  // Charge tensionMemory based on moment type
  const tensionCharge = {
    lead_change:      0.35,
    clutch_shot:      0.25,
    run_start:        0.20,
    free_throw_miss:  0.30,
  }[km.type] || 0;
  if (tensionCharge > 0) {
    tensionMemory = Math.min(1.0, tensionMemory + tensionCharge);
  }

  if (audioCtx && playing) {
    if (km.type === 'lead_change') {
      const now = audioCtx.currentTime;
      if (now - _lastDroneModT > 4) {
        _lastDroneModT = now;
        fireLeadChangeMod();
      }
    } else if (km.type === 'run_start') {
      fireSwell(0.08 + km.intensity * 0.1);
    }
  }

  // Anime visual effects for key moments
  if (currentMode === 'anime') {
    if (km.type === 'run_start') {
      triggerRunGlow(0.5 + km.intensity * 0.5);
      triggerFlash(0.5 + km.intensity * 0.4);
      triggerShake(0.6 + km.intensity * 0.6);
      showChyron(km.label, '#ff4466');
    } else if (km.type === 'lead_change') {
      _blackFlash = 2;  // 2-frame full black cut before flash
      triggerFlash(0.35);
      triggerShake(0.4);
      showChyron('Lead Change', '#3399ff');
    } else if (km.type === 'clutch_shot') {
      // Frame-freeze: 4 frames of stillness, then burst
      _animeFreeze = 4;
      triggerFlash(0.6 + km.intensity * 0.4);
      triggerShake(0.8 + km.intensity * 0.5);
      showChyron('Three!', '#ffaa00');
    } else if (km.type === 'timeout') {
      showChyron('Timeout', '#666');
    }
  }

  // Cosmic visual effects for key moments
  if (currentMode === 'cosmic') {
    if (km.type === 'run_start') {
      triggerCosmicWave(0.6 + km.intensity * 0.6);
    } else if (km.type === 'lead_change') {
      triggerCosmicSwap();
      triggerCosmicWave(0.4);
    }
  }

  // Director moments — evaluated after mode-specific effects
  if (km.type === 'clutch_shot') {
    const { h, a } = findScore(playheadSec);
    const timeLeft = gameDuration() - playheadSec;
    if (timeLeft < 90 && Math.abs(h - a) <= 3) triggerDirectorMoment('time_dilation');
  } else if (km.type === 'run_start') {
    const runPts = parseInt(km.label) || 0;  // label is e.g. "8-0 run"
    if (runPts >= 10 && tensionMemory > 0.6)  triggerDirectorMoment('gravitational_collapse');
  } else if (km.type === 'lead_change') {
    if (gameDuration() - playheadSec < 120)   triggerDirectorMoment('bass_drop');
  }
}

function updateAudio() {
  if (!audioCtx || !game) return;
  const now      = audioCtx.currentTime;
  const energy   = sampleAt(game.energyCurve,  playheadSec);
  const momentum = sampleAt(game.momentumCurve, playheadSec);
  const toBurst  = game.toBurst ? sampleAt(game.toBurst, playheadSec) : 0;
  const timeLeft = gameDuration() - playheadSec;

  // ── Post-peak silence: override volumes for exhale + recovery ──
  // silenceGain: 0.3 during silence (drones only), ramps to 1 during recovery
  const silenceGain     = _postPeakSilence ? 0.3 : (_postPeakRecovery > 0 ? 0.3 + _postPeakRecovery * 0.7 : 1.0);
  const silenceLayerMul = _postPeakSilence ? 0.0 : (_postPeakRecovery > 0 ? _postPeakRecovery : 1.0);

  // ── Scene audio grammar — layer multipliers per scene state ────
  // Blended across the same _sceneT as visuals.
  const _SA = [
    { drone: 1.0, chaos: 1.0, droneFilter: 1.0 },  // NEUTRAL
    { drone: 1.0, chaos: 1.5, droneFilter: 1.3 },  // TENSION  — chaos prominent, filter opens
    { drone: 0.3, chaos: 0.5, droneFilter: 0.6 },  // CLIMAX   — drones near-muted, compressor dominates
    { drone: 1.0, chaos: 0.0, droneFilter: 0.5 },  // AFTERMATH — ambient only, no chaos
  ];
  const saPrev = _SA[_prevScene];
  const saCur  = _SA[_currentScene];
  const saT    = _sceneT;
  const scDrone      = saPrev.drone      + (saCur.drone      - saPrev.drone)      * saT;
  const scChaos      = saPrev.chaos      + (saCur.chaos      - saPrev.chaos)      * saT;
  const scDroneFilter = saPrev.droneFilter + (saCur.droneFilter - saPrev.droneFilter) * saT;

  // ── Master volume ───────────────────────────────────────────────
  _master.gain.linearRampToValueAtTime(playing ? (0.15 + energy * 0.3) * silenceGain : 0, now + 0.5);

  // ── Layer 1: Ambient — filter opens with energy + scene modifier ─
  _drones.forEach((d, i) => {
    d.filt.frequency.linearRampToValueAtTime((120 + energy * 900 + i * 60) * scDroneFilter, now + 1);
  });

  // ── Layer 2: Momentum tonality — chord voicing + scene drone gain ─
  // home dominant → minor (darker); tied → suspended; away → major
  const tonality = momentum < -0.2 ? 'minor' : momentum > 0.2 ? 'major' : 'suspended';
  const targetCents = TONALITY[tonality];
  _drones.forEach((d, i) => {
    d.osc.detune.linearRampToValueAtTime(targetCents[i], now + 3);
    const baseDroneGain = 0.04 - i * 0.008;
    d.gain.gain.linearRampToValueAtTime(baseDroneGain * scDrone * silenceGain, now + 4);
  });

  // ── Layer 3: Chaos — turnover burst gates noise, with 2s independent tail ─
  if (_chaosGain) {
    const dtSecAudio = 1 / 60;  // audio runs every frame at ~60fps
    if (toBurst > 0.5) _chaosTail = Math.max(_chaosTail, toBurst);
    _chaosTail *= Math.exp(-dtSecAudio / 2.0);  // τ=2s decay
    const chaosVol = Math.max(
      toBurst > 0.3 ? (toBurst - 0.3) / 0.7 * 0.06 : 0,
      _chaosTail * 0.06
    );
    _chaosGain.gain.linearRampToValueAtTime(playing ? chaosVol * scChaos * silenceLayerMul : 0, now + 0.2);
  }

  // ── Layer 4: Clutch — insert compressor + heartbeat in final 4 min ─
  const clutchActive = timeLeft < 240 && playing;
  if (clutchActive && !_compActive) {
    // Route duck → compressor → master
    _duck.disconnect(_master);
    _duck.connect(_clutchComp);
    _clutchComp.connect(_master);
    _compActive = true;
  } else if (!clutchActive && _compActive) {
    _duck.disconnect(_clutchComp);
    _clutchComp.disconnect(_master);
    _duck.connect(_master);
    _compActive = false;
  }

  // Tension memory squeezes the compressor harder — more pressure, more presence
  if (_compActive) {
    _clutchComp.threshold.value = -18 - tensionMemory * 8;  // -18 → -26 at full tension
    _clutchComp.ratio.value     =   6 + tensionMemory * 4;  //   6 → 10
  }

  if (clutchActive && silenceLayerMul > 0) {
    const bpm      = 60 + (1 - timeLeft / 240) * 30;
    const interval = 60 / bpm;
    const beatPhase = (now % interval) / interval;
    const vol = (0.08 + energy * 0.12) * silenceLayerMul;
    if (beatPhase < 0.05) {
      _heartGain.gain.cancelScheduledValues(now);
      _heartGain.gain.setValueAtTime(vol, now);
      _heartGain.gain.exponentialRampToValueAtTime(0.001, now + interval * 0.7);
    }
  } else {
    _heartGain.gain.linearRampToValueAtTime(0, now + 0.5);
  }
}

// ─── Main loop ────────────────────────────────────────────────────────────────
function tick(ts) {
  requestAnimationFrame(tick);
  const dt = lastTs ? Math.min(ts - lastTs, 50) : 16.67;
  lastTs = ts;

  if (playing) {
    playheadSec += (dt / 1000) * speed * 20;
    if (playheadSec >= gameDuration()) {
      playheadSec = gameDuration();
      showEndCard();
    }
    // Advance per-event pointers
    if (game) {
      while (eventIdx < game.events.length && game.events[eventIdx].t <= playheadSec) {
        fireEventAudio(game.events[eventIdx]);
        updateBroadcastRun(game.events[eventIdx]);
        eventIdx++;
      }
      advanceScore(playheadSec);
    }
  }

  if (game && !endShown) computeScene();
  renderFrame(dt);
  if (!endShown) { updateScoreUI(); checkMoments(); }
  updateAudio();
}

function seek(sec) {
  playheadSec   = Math.max(0, Math.min(gameDuration(), sec));
  lastMomentIdx = -1;
  eventIdx = 0;
  _scoreIdx = 0; _scoreH = 0; _scoreA = 0;
  _bcRunTeam = null; _bcRunPts = 0;
  resetCrowdHeat();
  resetStateMemory();
  resetTensionMemory();
  resetPostPeak();
  resetScene();
  resetDirector();
  resetDisplayColor();
  _chaosTail = 0;
  _minEnvEnergy = 0; _minEnvMomentum = 0;
  _animeFreeze  = 0; _blackFlash = 0;
  _animeMomX = 0; _animeMomV = 0;
  _bcDiscreteEnergy = 0; _bcDiscreteMomentum = 0; _bcLastEventT = -1;
  if (game) {
    while (eventIdx < game.events.length && game.events[eventIdx].t <= sec) eventIdx++;
    advanceScore(sec);
  }
}

// ─── Timeline drag ────────────────────────────────────────────────────────────
const timeline = document.getElementById('timeline');
let dragging   = false;
function timelineSeek(e) {
  const rect = timeline.getBoundingClientRect();
  seek(Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * gameDuration());
}
timeline.addEventListener('mousedown', e => { dragging = true; timelineSeek(e); });
window.addEventListener('mousemove',   e => { if (dragging) timelineSeek(e); });
window.addEventListener('mouseup',     () => { dragging = false; });

// ─── Controls ────────────────────────────────────────────────────────────────
document.getElementById('play-btn').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('play-btn').textContent = playing ? '❚❚' : '▶';
  if (playing && playheadSec >= gameDuration()) { endShown = false; endSettleT = 0; document.getElementById('end-card').classList.remove('visible'); seek(0); }
});

document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    speed = parseFloat(btn.dataset.speed);
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ─── Cosmic renderer (Three.js, lazy-loaded) ─────────────────────────────────
let _three = null;      // { THREE, scene, camera, renderer, composer, ... }
let _cosmicLoading = false;
let _cosmicWave  = 0;   // gravitational wave amplitude 0→1
let _cosmicSwap  = 0;   // lead-change swap progress 0→1 (drives attractor interpolation)
let _cosmicSwapDir = 1; // which way attractors swap
let _camOrbitAngle = 0; // radians, increments each frame

// Inject Three.js CDN module — returns promise resolving to { THREE, addons }
function loadThree() {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.type = 'importmap';
    s.textContent = JSON.stringify({
      imports: {
        'three':                 'https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js',
        'three/addons/':         'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/',
      }
    });
    document.head.appendChild(s);

    const m = document.createElement('script');
    m.type = 'module';
    m.textContent = `
      import * as THREE from 'three';
      import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
      import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
      import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
      import { ShaderPass }      from 'three/addons/postprocessing/ShaderPass.js';
      window.__threeReady({ THREE, EffectComposer, RenderPass, UnrealBloomPass, ShaderPass });
    `;
    window.__threeReady = (libs) => { delete window.__threeReady; resolve(libs); };
    m.onerror = reject;
    document.head.appendChild(m);
  });
}

async function initCosmic() {
  if (_three) return; // already initialised
  if (_cosmicLoading) return;
  _cosmicLoading = true;

  const { THREE, EffectComposer, RenderPass, UnrealBloomPass, ShaderPass } = await loadThree();

  const cosmicCanvas = document.getElementById('cosmic-c');
  const renderer = new THREE.WebGLRenderer({ canvas: cosmicCanvas, antialias: false, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
  camera.position.set(0, 0, 280);

  // ── Star field geometry ─────────────────────────────────────────
  const STAR_COUNT = 3000;
  const positions  = new Float32Array(STAR_COUNT * 3);
  const basePos    = new Float32Array(STAR_COUNT * 3); // rest positions
  const teamSide   = new Float32Array(STAR_COUNT);     // -1 = home, +1 = away
  const starSizes  = new Float32Array(STAR_COUNT);

  for (let i = 0; i < STAR_COUNT; i++) {
    // Each star assigned to home (left) or away (right) nebula
    const side  = i < STAR_COUNT / 2 ? -1 : 1;
    const cx    = side * 80;  // nebula center x
    // Gaussian-ish spread around nebula center
    const r     = 20 + Math.random() * 100;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const x = cx + r * Math.sin(phi) * Math.cos(theta);
    const y =      r * Math.sin(phi) * Math.sin(theta);
    const z =      r * Math.cos(phi);
    basePos[i*3]   = x; basePos[i*3+1] = y; basePos[i*3+2] = z;
    positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
    teamSide[i]    = side;
    starSizes[i]   = 1.5 + Math.random() * 4;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(starSizes, 1));
  geo.setAttribute('side',     new THREE.BufferAttribute(teamSide,  1));

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      homeColor:     { value: new THREE.Color(0x1D428A) },
      awayColor:     { value: new THREE.Color(0x860038) },
      homePos:       { value: new THREE.Vector3(-80, 0, 0) },
      awayPos:       { value: new THREE.Vector3( 80, 0, 0) },
      momentum:      { value: 0.0 },
      energy:        { value: 0.5 },
      tensionMemory: { value: 0.0 },
    },
    vertexShader: `
      attribute float size;
      attribute float side;
      uniform vec3  homePos;
      uniform vec3  awayPos;
      uniform float momentum;
      uniform float energy;
      uniform float tensionMemory;
      varying float vSide;

      void main() {
        // side is -1 for home, +1 for away — baked at creation time

        // Inverse-square gravity: dominant team's pull scales with 1/dist²
        // Stronger pull compresses the losing nebula; weaker disperses the winning one.
        float homeStr = clamp(0.5 - momentum * 0.5, 0.0, 1.0);
        float awayStr = clamp(0.5 + momentum * 0.5, 0.0, 1.0);
        float pull = (side < 0.0) ? homeStr : awayStr;

        vec3 center = (side < 0.0) ? homePos : awayPos;
        vec3 offset = position - center;
        float dist2  = dot(offset, offset);
        // k chosen so at typical dist²≈6400 (dist=80), scale ≈ 0.6+pull*0.8 as before
        float k      = 5120.0;
        float invSq  = k / (dist2 + 400.0);  // ε=400 prevents singularity
        float scale  = 0.4 + pull * clamp(invSq, 0.2, 1.4);

        // Nebula elongation: dominant team stretches toward center proportional to tensionMemory
        float isDominant = (side < 0.0) ? clamp(-momentum, 0.0, 1.0)
                                        : clamp( momentum, 0.0, 1.0);
        float stretchX = 1.0 + isDominant * tensionMemory * 0.4;
        vec3 scaledOffset = vec3(offset.x * scale * stretchX,
                                 offset.y * scale,
                                 offset.z * scale);
        vec3 newPos = center + scaledOffset;

        vSide = side;
        vec4 mvPos = modelViewMatrix * vec4(newPos, 1.0);
        gl_PointSize = size * (1.0 + energy * 1.5) * (300.0 / -mvPos.z);
        gl_Position  = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      uniform vec3  homeColor;
      uniform vec3  awayColor;
      uniform float momentum;
      uniform float energy;
      varying float vSide;

      void main() {
        // Soft circular point
        vec2  uv   = gl_PointCoord - 0.5;
        float dist = length(uv);
        if (dist > 0.5) discard;
        float alpha = (1.0 - dist * 2.0) * (0.5 + energy * 0.5);

        // Blend toward dominant team's color
        float t = clamp((momentum + 1.0) * 0.5, 0.0, 1.0);
        vec3 col = mix(homeColor, awayColor, t);
        // Stars on the losing side tint slightly toward grey
        float dimmer = (vSide < 0.0) ? (1.0 - clamp(momentum, 0.0, 1.0) * 0.4)
                                      : (1.0 + clamp(momentum, -1.0, 0.0) * 0.4);
        col *= dimmer;

        gl_FragColor = vec4(col, alpha);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  const stars = new THREE.Points(geo, mat);
  scene.add(stars);

  // ── Post-processing ──────────────────────────────────────────────
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));

  const bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    1.4,   // strength
    0.4,   // radius
    0.15   // threshold
  );
  composer.addPass(bloom);

  // Film grain + vignette as a single ShaderPass
  const grainVignette = new ShaderPass({
    uniforms: {
      tDiffuse: { value: null },
      time:     { value: 0.0 },
      grainAmt: { value: 0.055 },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
    `,
    fragmentShader: `
      uniform sampler2D tDiffuse;
      uniform float     time;
      uniform float     grainAmt;
      varying vec2      vUv;

      float rand(vec2 co) {
        return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453 + time);
      }

      void main() {
        vec4 col = texture2D(tDiffuse, vUv);

        // Grain
        float grain = (rand(vUv) - 0.5) * grainAmt;
        col.rgb += grain;

        // Vignette
        vec2  uv = vUv - 0.5;
        float v  = 1.0 - dot(uv, uv) * 2.2;
        col.rgb *= clamp(v, 0.0, 1.0);

        gl_FragColor = col;
      }
    `,
  });
  composer.addPass(grainVignette);

  // Handle resize
  function onResize() {
