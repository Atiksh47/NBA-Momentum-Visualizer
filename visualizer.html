    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    composer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    bloom.resolution.set(w, h);
  }
  window.addEventListener('resize', onResize);

  _three = { THREE, scene, camera, renderer, composer,
             mat, geo, positions, basePos, teamSide,
             grainVignette, bloom, onResize,
             waveWasActive: false };
  _cosmicLoading = false;
}

function destroyCosmic() {
  if (!_three) return;
  window.removeEventListener('resize', _three.onResize);
  _three.renderer.dispose();
  _three.geo.dispose();
  _three.mat.dispose();
  _three = null;
}

function triggerCosmicWave(intensity) {
  _cosmicWave = Math.max(_cosmicWave, intensity);
}

function triggerCosmicSwap() {
  _cosmicSwap    = 0.001; // kick off the swap lerp
  _cosmicSwapDir *= -1;   // alternate direction each swap
}

function drawCosmic(dt) {
  if (!_three || !game) return;
  const { THREE, scene, camera, renderer, composer, mat, geo, positions, basePos, teamSide, grainVignette } = _three;

  let momentum = sampleAt(game.momentumCurve, playheadSec);
  let energy   = sampleAt(game.energyCurve,   playheadSec);
  if (endSettleT > 0) {
    const wm = game.finalScore.away > game.finalScore.home ? 1 : -1;
    momentum = momentum + (wm - momentum) * endSettleT;
    energy   = energy   * (1 - endSettleT * 0.6);
  }

  // ── Advance wave & swap ──────────────────────────────────────────
  _cosmicWave = Math.max(0, _cosmicWave - 0.025 * dt / 16.67);
  if (_cosmicSwap > 0) _cosmicSwap = Math.min(1, _cosmicSwap + 0.008 * dt / 16.67);

  // ── Camera orbit ─────────────────────────────────────────────────
  const timeLeft      = gameDuration() - playheadSec;
  const finalMinutes  = timeLeft < 240;
  const orbitSpeed    = finalMinutes ? 0.0008 : 0.00025;
  const orbitRadius   = finalMinutes ? Math.max(180, 280 - (1 - timeLeft/240) * 100) : 280;
  _camOrbitAngle += orbitSpeed * dt;
  // Tension slows camera response — lerp factor 0.02 → 0.006 at full tension.
  // High tension = momentum shifts arrive heavier, camera feels reluctant.
  const camLerp = 0.02 - tensionMemory * 0.014;
  // Camera lean: bias X toward dominant team's side (momentum * 30 units)
  const camTargetX = Math.sin(_camOrbitAngle) * orbitRadius * 0.35 + momentum * 30;
  camera.position.x += (camTargetX - camera.position.x) * camLerp;
  camera.position.y += (Math.cos(_camOrbitAngle * 0.6) * orbitRadius * 0.15 - camera.position.y) * camLerp;
  camera.position.z += (orbitRadius - camera.position.z) * camLerp;
  camera.lookAt(0, 0, 0);

  // ── Attractor positions (lead-change swap) ────────────────────────
  // Base: home=-80x, away=+80x. Swap lerp moves them through a vertical arc.
  const swapEase = _cosmicSwap < 1 ? _cosmicSwap * _cosmicSwap * (3 - 2 * _cosmicSwap) : 1;
  const homeSignedX = -80 * (1 - swapEase) + 80 * swapEase * _cosmicSwapDir;
  const awaySignedX =  80 * (1 - swapEase) - 80 * swapEase * _cosmicSwapDir;
  const arcY = Math.sin(_cosmicSwap * Math.PI) * 60; // arc peak
  mat.uniforms.homePos.value.set(homeSignedX,  arcY, 0);
  mat.uniforms.awayPos.value.set(awaySignedX, -arcY, 0);

  // ── Gravitational collapse director moment ───────────────────────
  if (_collapseActive) {
    _collapseTimer -= dt;
    if (_collapseTimer <= 0) {
      if (_collapsePhase === 0) {
        // Switch to explode-out phase
        _collapsePhase = 1;
        _collapseTimer = 1500;
        triggerCosmicWave(1.0);  // big outward wave
      } else {
        _collapseActive = false;
        geo.attributes.position.array.set(basePos);
        geo.attributes.position.needsUpdate = true;
      }
    }
    if (_collapseActive) {
      const dominantX = momentum > 0 ? 80 : -80;  // dominant nebula center
      const collapseT = _collapsePhase === 0
        ? 1 - (_collapseTimer / 1500)   // 0→1 lurch in
        : _collapseTimer / 1500;        // 1→0 explode out
      const pos = geo.attributes.position.array;
      const n   = pos.length / 3;
      for (let i = 0; i < n; i++) {
        const bx = basePos[i*3], by = basePos[i*3+1], bz = basePos[i*3+2];
        pos[i*3]   = bx + (dominantX - bx) * collapseT * 0.6;
        pos[i*3+1] = by * (1 - collapseT * 0.5);
        pos[i*3+2] = bz * (1 - collapseT * 0.5);
      }
      geo.attributes.position.needsUpdate = true;
    }
  }

  // ── Update star positions for gravitational wave ──────────────────
  const waveActive = _cosmicWave > 0.005 && !_collapseActive;
  if (waveActive !== _three.waveWasActive) {
    // State transition: always update on change
    _three.waveWasActive = waveActive;
    if (!waveActive) {
      geo.attributes.position.array.set(basePos);
      geo.attributes.position.needsUpdate = true;
    }
  }
  if (waveActive) {
    const pos = geo.attributes.position.array;
    const n   = pos.length / 3;
    for (let i = 0; i < n; i++) {
      const bx = basePos[i*3], by = basePos[i*3+1], bz = basePos[i*3+2];
      const dist = Math.sqrt(bx*bx + by*by + bz*bz);
      const push = _cosmicWave * 18 * Math.exp(-dist / 90);
      const nx = dist > 0.001 ? bx / dist : 0;
      const ny = dist > 0.001 ? by / dist : 0;
      const nz = dist > 0.001 ? bz / dist : 0;
      pos[i*3]   = bx + nx * push;
      pos[i*3+1] = by + ny * push;
      pos[i*3+2] = bz + nz * push;
    }
    geo.attributes.position.needsUpdate = true;
  }

  // ── Update shader uniforms ────────────────────────────────────────
  mat.uniforms.momentum.value      = momentum;
  mat.uniforms.energy.value        = energy;
  mat.uniforms.tensionMemory.value = tensionMemory;

  const homeRgb = hexToRgb(game.homeColor);
  const awayRgb = hexToRgb(game.awayColor);
  mat.uniforms.homeColor.value.setRGB(homeRgb[0]/255, homeRgb[1]/255, homeRgb[2]/255);
  mat.uniforms.awayColor.value.setRGB(awayRgb[0]/255, awayRgb[1]/255, awayRgb[2]/255);

  // Bloom strength: higher energy = more bloom
  _three.bloom.strength = 1.0 + energy * 1.2;

  // Grain time uniform (animates noise)
  grainVignette.uniforms.time.value += dt * 0.001;

  composer.render();
}

// ─── Broadcast renderer ───────────────────────────────────────────────────────
let _bcRunTeam = null;   // 'home' | 'away' | null — which team is on a live run
let _bcRunPts  = 0;
let _bcRecapTimer = 0;   // ms remaining for quarter-end recap card
let _bcLastPeriod = 1;

function drawBroadcast(dt) {
  const raw    = simulateAndGetParams(dt);
  // Broadcast: discrete updates — visuals only shift on scoring events, not every frame
  const shaped = shapeBroadcast(raw.energy, raw.momentum);
  const { activeCount } = raw;
  const energy = shaped.energy;
  const sp      = getSceneParams();
  const primary   = desaturateRgb(raw.primary,   sp.desat);
  const secondary = desaturateRgb(raw.secondary, sp.desat);

  // Reduced particle density (50% of normal) — data layer is the visual here
  const bcCount = Math.floor(activeCount * 0.5);

  // Slightly lighter trail fade than minimal so background stays legible
  ctx.fillStyle = `rgba(8,12,28,${0.22 - energy * 0.06 + raw.tensionMemory * 0.05 + sp.bgDark})`;
  ctx.fillRect(0, 0, W, H);

  // Subtle central glow — suppressed during post-peak silence
  if (energy > 0.1 && !raw.postPeakSilence) {
    const glowScale = raw.postPeakRecovery > 0 ? raw.postPeakRecovery : 1;
    const r   = Math.min(W, H) * 0.6;
    const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, r);
    grd.addColorStop(0, rgbStr(primary, energy * 0.06 * glowScale));
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
  }

  // Particles — 50% count, subdued; data layer is the dominant visual
  for (let i = 0; i < bcCount; i++) {
    const p     = pool[i];
    const alpha = (0.2 + energy * 0.45) * (0.6 + 0.4 * Math.sin(p.life * Math.PI * 2));
    if (p.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let j = 1; j < p.trail.length; j++) ctx.lineTo(p.trail[j].x, p.trail[j].y);
      ctx.strokeStyle = rgbStr(secondary, alpha * 0.25);
      ctx.lineWidth   = p.radius * 0.5;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * (0.9 + energy * 0.3), 0, Math.PI * 2);
    ctx.fillStyle = rgbStr(primary, alpha * 0.85);
    ctx.fill();
  }

  updateBroadcastHUD(dt);
}

function bcClockStr(sec) {
  const period    = Math.min(Math.floor(sec / 720) + 1, 4);
  const inPeriod  = sec % 720;
  const remaining = 720 - inPeriod;
  const m = Math.floor(remaining / 60);
  const s = Math.floor(remaining % 60);
  return { clock: `${m}:${s.toString().padStart(2, '0')}`, period: `Q${period}`, periodNum: period };
}

function updateBroadcastHUD(dt) {
  if (!game) return;

  const s   = Math.min(Math.round(playheadSec), game.momentumCurve.length - 1);
  const momentum = game.momentumCurve[s];
  const { h, a } = findScore(playheadSec);
  const { clock, period, periodNum } = bcClockStr(playheadSec);

  // Score bug
  document.getElementById('bc-home-score').textContent = h;
  document.getElementById('bc-away-score').textContent = a;
  document.getElementById('bc-clock').textContent  = clock;
  document.getElementById('bc-period').textContent = period;

  // Foul trouble badges (4+ fouls in half)
  if (game.homeFouls && game.awayFouls) {
    const hf = game.homeFouls[s] || 0;
    const af = game.awayFouls[s] || 0;
    document.getElementById('bc-home-fouls').classList.toggle('visible', hf >= 4);
    document.getElementById('bc-away-fouls').classList.toggle('visible', af >= 4);
  }

  // Momentum bar: home color on left, away on right, split at momentum midpoint
  // momentum: -1 = full home, +1 = full away
  const fill    = document.getElementById('bc-momentum-fill');
  const midPct  = ((momentum + 1) / 2) * 100; // 0–100
  if (momentum >= 0) {
    // Away leading: fill from midpoint rightward in away color
    fill.style.left       = '50%';
    fill.style.right      = (100 - midPct) + '%';
    fill.style.background = game.awayColor;
  } else {
    // Home leading: fill from midpoint leftward in home color
    fill.style.left       = midPct + '%';
    fill.style.right      = '50%';
    fill.style.background = game.homeColor;
  }

  // Shooting streak tag
  const streak = document.getElementById('bc-streak');
  if (game.homeFgPct && game.awayFgPct) {
    const hfg = game.homeFgPct[s];
    const afg = game.awayFgPct[s];
    if (hfg >= 0.60) {
      streak.textContent = `${game.homeTeam} on fire  ${Math.round(hfg * 100)}% FG`;
      streak.style.background = game.homeColor + 'cc';
      streak.style.color = '#fff';
      streak.classList.add('visible');
    } else if (afg >= 0.60) {
      streak.textContent = `${game.awayTeam} on fire  ${Math.round(afg * 100)}% FG`;
      streak.style.background = game.awayColor + 'cc';
      streak.style.color = '#fff';
      streak.classList.add('visible');
    } else if (hfg <= 0.25) {
      streak.textContent = `${game.homeTeam} ice cold  ${Math.round(hfg * 100)}% FG`;
      streak.style.background = 'rgba(40,60,100,0.85)';
      streak.style.color = 'rgba(255,255,255,0.6)';
      streak.classList.add('visible');
    } else if (afg <= 0.25) {
      streak.textContent = `${game.awayTeam} ice cold  ${Math.round(afg * 100)}% FG`;
      streak.style.background = 'rgba(40,60,100,0.85)';
      streak.style.color = 'rgba(255,255,255,0.6)';
      streak.classList.add('visible');
    } else {
      streak.classList.remove('visible');
    }
  }

  // Live run banner — track unanswered scoring from events
  const banner = document.getElementById('bc-run-banner');
  if (_bcRunPts > 0 && _bcRunTeam) {
    const teamName = _bcRunTeam === 'home' ? game.homeTeam : game.awayTeam;
    const color    = _bcRunTeam === 'home' ? game.homeColor : game.awayColor;
    banner.textContent = `${teamName} on a ${_bcRunPts}-0 run`;
    banner.style.borderLeftColor = color;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }

  // Quarter recap card — show for 3s after a period ends
  if (_bcRecapTimer > 0) {
    _bcRecapTimer -= dt;
    document.getElementById('bc-recap').classList.add('visible');
    if (_bcRecapTimer <= 0) document.getElementById('bc-recap').classList.remove('visible');
  }

  // Detect period boundary to show recap
  if (periodNum !== _bcLastPeriod && periodNum > _bcLastPeriod) {
    const finishedQ = _bcLastPeriod;
    document.getElementById('bc-recap-label').textContent = `End of Q${finishedQ}`;
    document.getElementById('bc-recap-score').textContent = `${game.homeTeam}  ${h} — ${a}  ${game.awayTeam}`;
    _bcRecapTimer = 3000;
    _bcLastPeriod = periodNum;
  }
}

// Called from the main event loop to track live run for broadcast banner
function updateBroadcastRun(evt) {
  if (currentMode !== 'broadcast') return;
  if (evt.type !== 'score' && evt.type !== 'free_throw') return;
  if (evt.scoreDelta === 0) return;

  if (_bcRunTeam === null || _bcRunTeam === evt.team) {
    _bcRunTeam = evt.team;
    _bcRunPts += evt.scoreDelta;
  } else {
    // Other team scored — reset run
    _bcRunTeam = evt.team;
    _bcRunPts  = evt.scoreDelta;
  }
}

// ─── Mode toggle ──────────────────────────────────────────────────────────────
const MODES = ['minimal', 'anime', 'cosmic', 'broadcast'];
const modeBtn = document.getElementById('mode-btn');

function applyMode(mode) {
  currentMode = mode;
  const canvas2d     = document.getElementById('c');
  const cosmicCanvas = document.getElementById('cosmic-c');

  // Canvas visibility
  canvas2d.style.display     = mode === 'cosmic' ? 'none' : 'block';
  cosmicCanvas.style.display = mode === 'cosmic' ? 'block' : 'none';

  // Button label + class
  modeBtn.className = '';
  if (mode === 'anime')      { modeBtn.textContent = 'Anime';      modeBtn.classList.add('anime'); }
  if (mode === 'cosmic')     { modeBtn.textContent = 'Cosmic';     modeBtn.classList.add('cosmic'); }
  if (mode === 'broadcast')  { modeBtn.textContent = 'Broadcast';  modeBtn.classList.add('broadcast'); }
  if (mode === 'minimal')    { modeBtn.textContent = 'Minimal'; }

  // Reset mode-specific transient state
  if (mode !== 'anime') { shakeX=0; shakeY=0; shakeTtl=0; flashAlpha=0; runGlow=0; hideChyron(); }
  if (mode !== 'cosmic') { _cosmicWave=0; _cosmicSwap=0; }
  if (mode !== 'broadcast') {
    document.getElementById('broadcast-hud').style.display = 'none';
  }

  // Moment overlay: only visible in minimal
  document.getElementById('moment-overlay').style.display = mode === 'minimal' ? '' : 'none';

  // Broadcast HUD setup
  if (mode === 'broadcast' && game) {
    const hud = document.getElementById('broadcast-hud');
    hud.style.display = 'block';
    // Color the team blocks
    document.getElementById('bc-home-block').style.background = game.homeColor + 'dd';
    document.getElementById('bc-away-block').style.background = game.awayColor + 'dd';
    document.getElementById('bc-home-tri').textContent = game.homeTeam;
    document.getElementById('bc-away-tri').textContent = game.awayTeam;
    // Reset run tracker
    _bcRunTeam = null; _bcRunPts = 0;
    _bcRecapTimer = 0; _bcLastPeriod = Math.min(Math.floor(playheadSec / 720) + 1, 4);
    document.getElementById('bc-recap').classList.remove('visible');
  }

  // Lazy-init Three.js on first switch to cosmic
  if (mode === 'cosmic') initCosmic();
}

modeBtn.addEventListener('click', () => {
  const next = MODES[(MODES.indexOf(currentMode) + 1) % MODES.length];
  applyMode(next);
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
const gameId     = new URLSearchParams(location.search).get('game') || '0041500407';
const startScreen = document.getElementById('start-screen');

loadGame(gameId).then(() => {
  startScreen.addEventListener('click', () => {
    initAudio();
    startScreen.style.opacity = '0';
    setTimeout(() => { startScreen.style.display = 'none'; }, 1200);
    document.getElementById('score-display').style.opacity = '1';
    document.getElementById('controls').style.opacity      = '1';
    document.getElementById('back-btn').style.opacity      = '1';
    playing = true;
    document.getElementById('play-btn').textContent = '❚❚';
    requestAnimationFrame(tick);
  });
});
</script>
